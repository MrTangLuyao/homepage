<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Louie's Blog — dev logs, notes, and small experiments">
  <title>Louie — Blog</title>
  <link rel="icon" href="lib/po.webp">
  <link rel="stylesheet" href="lib/fonts.css">
  <script src="lib/tailwindcss.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            m3: {
              surface: '#1f1f1e',
              surfaceContainer: '#2a2a29',
              surfaceContainerHigh: '#333332',
              primary: '#d97757',
              onPrimary: '#ffffff',
              primaryContainer: 'rgba(217, 119, 87, 0.15)',
              onPrimaryContainer: '#ffb49d',
              outline: '#4a4a49',
              outlineVariant: '#3a3a39',
              onSurface: '#e8e8e8',
              onSurfaceVariant: '#a1a1a0'
            }
          },
          fontFamily: {
            sans: ['JetBrains Mono', 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
          borderRadius: {
            'm3-xs': '4px',
            'm3-sm': '8px',
            'm3-md': '12px',
            'm3-lg': '16px',
            'm3-xl': '24px',
            'm3-full': '9999px',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'JetBrains Mono', 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;
      background-color: #1f1f1e;
      color: #e8e8e8;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ─── M3 Ripple & Animations ─── */
    .ripple-surface { position: relative; overflow: hidden; }
    .ripple {
      position: absolute; border-radius: 50%; transform: scale(0);
      animation: ripple 600ms linear; pointer-events: none;
      background-color: rgba(255, 255, 255, 0.15); /* Base ripple color */
    }
    .ripple-surface-variant .ripple { background-color: rgba(255, 255, 255, 0.1); }
    .ripple-primary .ripple { background-color: rgba(217, 119, 87, 0.3); }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    .m3-card { transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease; }
    .m3-card:hover {
      background-color: #333332; box-shadow: 0 8px 16px rgba(0,0,0,0.3); transform: translateY(-2px);
    }
    
    .fade-in {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .fade-in.visible { opacity: 1; transform: none; }

    #mobile-menu {
      transition: clip-path 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      clip-path: circle(0% at top right);
    }
    #mobile-menu.open { clip-path: circle(150% at top right); }

    /* ─── Reader Prose Overrides mapped to M3 ─── */
    .reader-body { font-size: 16px; line-height: 1.95; color: #e8e8e8; }
    .reader-body > * + * { margin-top: 1.25em; }
    .reader-body .lead {
      font-size: 18px; color: #a1a1a0; border-left: 3px solid #d97757;
      padding-left: 18px; margin-bottom: 32px; font-style: italic;
    }
    .reader-body h2 {
      font-size: 22px; font-weight: 700; color: #ffffff;
      margin-top: 48px; margin-bottom: 16px; padding-top: 16px;
      border-top: 1px solid #3a3a39;
    }
    .reader-body h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .reader-body h3 { font-size: 18px; font-weight: 700; color: #ffffff; margin-top: 36px; }
    .reader-body p { color: #e8e8e8; }
    .reader-body strong { color: #d97757; font-weight: 700; }
    .reader-body em { color: #a1a1a0; font-style: italic; }
    .reader-body a {
      color: #d97757; text-decoration: none;
      border-bottom: 1px solid rgba(217, 119, 87, 0.3); transition: border-color 0.25s ease;
    }
    .reader-body a:hover { border-bottom-color: #d97757; }
    .reader-body ul, .reader-body ol { padding-left: 28px; color: #e8e8e8; }
    .reader-body li + li { margin-top: 6px; }
    .reader-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
      color: #ffb49d; background: rgba(217, 119, 87, 0.15);
      padding: 2px 6px; border-radius: 6px;
    }
    .reader-body pre {
      background: #2a2a29; border: 1px solid #3a3a39; border-radius: 12px;
      padding: 16px; overflow-x: auto; font-size: 14px; line-height: 1.7;
    }
    .reader-body pre code { color: #e8e8e8; background: none; padding: 0; }
    .reader-body img {
      max-width: 100%; height: auto; border-radius: 12px;
      margin: 24px auto; display: block; border: 1px solid #3a3a39;
    }
    .reader-body blockquote {
      border-left: 4px solid rgba(217, 119, 87, 0.6); padding: 8px 20px;
      margin: 24px 0; color: #a1a1a0; font-style: italic;
      background: rgba(217, 119, 87, 0.05); border-radius: 0 12px 12px 0;
    }
    .reader-body hr {
      border: none; height: 1px; margin: 48px 0;
      background: linear-gradient(90deg, transparent, #3a3a39, transparent);
    }
    .reader-body table {
      width: 100%; border-collapse: collapse; font-size: 14px;
      margin: 24px 0; border: 1px solid #3a3a39; border-radius: 8px; overflow: hidden;
    }
    .reader-body th {
      background: rgba(217, 119, 87, 0.1); color: #ffb49d;
      font-weight: 700; padding: 12px 16px; text-align: left;
      border-bottom: 1px solid #3a3a39;
    }
    .reader-body td { padding: 10px 16px; border-bottom: 1px solid #3a3a39; vertical-align: top; }
    .reader-body tr:last-child td { border-bottom: none; }
    .reader-body tbody tr:hover { background: rgba(255, 255, 255, 0.02); }

    /* ─── TOC sidebar ─── */
    #toc-sidebar {
      position: fixed;
      top: 128px;
      /* 强制限定高度计算，放弃模糊的 bottom / max-height */
      height: calc(100vh - 152px); 
      left: max(16px, calc((100vw - 896px) / 2 - 280px));
      width: 260px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none; 
      -ms-overflow-style: none; 
    }
    #toc-sidebar::-webkit-scrollbar { display: none; }
    @media (max-width: 1359px) { #toc-sidebar { display: none !important; } }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- M3 Top App Bar -->
  <header class="fixed top-0 w-full z-[100] bg-m3-surface/95 backdrop-blur border-b border-m3-outlineVariant h-16 flex items-center justify-between px-4 md:px-6">
    <div class="flex items-center gap-2">
      <!-- Brand Menu (M3 Style) -->
      <div class="relative" id="brand-dropdown-container">
        <button id="brand-dropdown-btn" class="ripple-surface ripple-surface-variant px-3 py-2 rounded-m3-full font-bold text-lg flex items-center cursor-pointer">
          <span class="text-m3-onSurface">louie</span>
          <span class="text-m3-primary mx-1.5">.</span>
          <span class="text-m3-onSurface/60 font-medium tracking-wide">blog</span>
          <svg id="brand-dropdown-icon" class="w-4 h-4 ml-1.5 text-m3-onSurface/60 transition-transform duration-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div id="brand-dropdown-menu" class="absolute top-full left-0 mt-2 w-48 bg-m3-surfaceContainer rounded-m3-sm shadow-lg shadow-black/40 border border-m3-outlineVariant opacity-0 pointer-events-none transition-opacity duration-200 z-[110] py-2 overflow-hidden">
          <a href="index.html" class="ripple-surface ripple-surface-variant block px-4 py-3 text-sm font-medium text-m3-onSurfaceVariant hover:text-m3-onSurface hover:bg-m3-surfaceContainerHigh transition-colors">louie.home</a>
          <a href="blog.html" class="ripple-surface ripple-surface-variant block px-4 py-3 text-sm font-medium text-m3-primary bg-m3-primaryContainer/30 hover:bg-m3-surfaceContainerHigh transition-colors">louie.blog</a>
          <a href="learn.html" class="ripple-surface ripple-surface-variant block px-4 py-3 text-sm font-medium text-m3-onSurfaceVariant hover:text-m3-onSurface hover:bg-m3-surfaceContainerHigh transition-colors">louie.learn</a>
          <a href="95.html" class="ripple-surface ripple-surface-variant block px-4 py-3 text-sm font-medium text-m3-onSurfaceVariant hover:text-m3-onSurface hover:bg-m3-surfaceContainerHigh transition-colors">louie.95</a>
        </div>

    <!-- Desktop Nav (Only Lang Toggle for Blog Page) -->
    <nav class="hidden md:flex items-center gap-1">
      <button onclick="toggleLang()" id="lang-toggle" class="ripple-surface ripple-surface-variant border border-m3-outline px-4 py-1.5 rounded-m3-full text-sm font-medium text-m3-primary hover:bg-m3-primaryContainer transition-colors">EN</button>
    </nav>

    <!-- Mobile Nav Toggle -->
    <button id="menu-btn" class="md:hidden ripple-surface px-3 py-3 rounded-m3-full text-m3-onSurface">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </header>

  <div id="mobile-menu" class="fixed top-16 left-0 w-full bg-m3-surfaceContainer border-b border-m3-outlineVariant z-[90] flex flex-col p-4 shadow-xl md:hidden">
    <button onclick="toggleLang()" class="text-left px-4 py-3 text-m3-primary rounded-m3-md hover:bg-m3-primaryContainer">Switch Lang</button>
  </div>

  <main class="flex-grow pt-28 pb-20 px-6 max-w-4xl w-full mx-auto relative z-10">
    <!-- LIST VIEW -->
    <div id="view-list">
      <div class="mb-14 fade-in">
        <p class="text-m3-primary font-bold tracking-widest uppercase mb-4 text-xs flex items-center gap-3 before:w-8 before:h-[2px] before:bg-m3-primary" data-i18n="blog-greeting">notes</p>
        <h1 class="text-4xl md:text-5xl font-extrabold leading-tight text-m3-onSurface mb-3" data-i18n="blog-title">Blog</h1>
        <p class="text-m3-onSurfaceVariant text-[17px]" data-i18n="blog-sub">Louie 的博客及文章</p>
      </div>

      <!-- M3 Filter Chips -->
      <div class="flex flex-wrap gap-3 py-6 mb-8 border-y border-m3-outlineVariant fade-in" id="tag-bar">
        <!-- JS rendered -->
      </div>

      <div class="grid gap-6" id="blog-list">
        <!-- JS rendered -->
      </div>

      <div class="text-center py-20 text-m3-onSurfaceVariant text-sm" id="blog-empty" style="display:none;" data-i18n="blog-empty">
        No posts yet — come back soon.
      </div>
    </div>

    <!-- READER VIEW -->
    <article id="view-reader" style="display:none;" class="w-full">
      <!-- M3 Fixed Sidebar TOC -->
      <!-- 移除干扰定位的内联 style，完全由 CSS 接管 -->
      <nav id="toc-sidebar" aria-label="Table of contents" class="hidden flex-col z-50 bg-m3-surfaceContainer/90 backdrop-blur border border-m3-outlineVariant rounded-m3-xl p-4 shadow-lg shadow-black/20">
        <!-- JS rendered -->
      </nav>

      <a href="#" class="ripple-surface ripple-surface-variant inline-flex items-center gap-2 px-5 py-2 mb-10 rounded-m3-full text-sm font-medium text-m3-onSurfaceVariant border border-m3-outline hover:text-m3-onSurface hover:bg-m3-surfaceContainerHigh transition-colors" id="reader-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span data-i18n="reader-back">All posts</span>
      </a>

      <div id="reader-content" class="w-full">
        <!-- JS rendered -->
      </div>
    </article>
  </main>

  <footer class="text-center py-10 mt-auto border-t border-m3-outlineVariant bg-m3-surfaceContainer/30">
    <div class="text-sm text-m3-onSurfaceVariant tracking-widest font-mono" data-i18n="footer-copy">
      Copyright © 2026 Louie’s Blog
    </div>
  </footer>

  <script src="lib/luxon.min.js"></script>
  <script src="blog_data/manifest.js"></script>
  <script>
    /* ─── M3 Global Interaction Logic ─── */
    function bindRipples() {
      const buttons = document.querySelectorAll('.ripple-surface:not(.ripple-bound)');
      for (const button of buttons) {
        button.classList.add('ripple-bound');
        button.addEventListener('mousedown', (event) => {
          const circle = document.createElement("span");
          const diameter = Math.max(button.clientWidth, button.clientHeight);
          const radius = diameter / 2;
          const rect = button.getBoundingClientRect();
          circle.style.width = circle.style.height = `${diameter}px`;
          circle.style.left = `${event.clientX - rect.left - radius}px`;
          circle.style.top = `${event.clientY - rect.top - radius}px`;
          circle.classList.add("ripple");
          const existingRipple = button.querySelector('.ripple');
          if (existingRipple) { existingRipple.remove(); }
          button.appendChild(circle);
        });
      }
    }

    const brandBtn = document.getElementById('brand-dropdown-btn');
    const brandMenu = document.getElementById('brand-dropdown-menu');
    const brandIcon = document.getElementById('brand-dropdown-icon');

    brandBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = brandMenu.classList.contains('opacity-100');
      if (isOpen) {
        brandMenu.classList.remove('opacity-100', 'pointer-events-auto');
        brandMenu.classList.add('opacity-0', 'pointer-events-none');
        brandIcon.style.transform = 'rotate(0deg)';
      } else {
        brandMenu.classList.remove('opacity-0', 'pointer-events-none');
        brandMenu.classList.add('opacity-100', 'pointer-events-auto');
        brandIcon.style.transform = 'rotate(180deg)';
      }
    });

    document.addEventListener('click', (e) => {
      if (!brandBtn.contains(e.target) && !brandMenu.contains(e.target)) {
        brandMenu.classList.remove('opacity-100', 'pointer-events-auto');
        brandMenu.classList.add('opacity-0', 'pointer-events-none');
        brandIcon.style.transform = 'rotate(0deg)';
      }
    });

    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('open'));
    mobileMenu.addEventListener('click', () => mobileMenu.classList.remove('open'));

    /* ─── i18n ─── */
    const translations = {
      zh: {
        'blog-greeting': '笔记',
        'blog-title': '博客',
        'blog-sub': 'Louie 的博客及文章',
        'blog-tag-all': '全部',
        'blog-empty': '还没有文章——稍后回来看看吧。',
        'reader-back': '所有文章',
        'reader-min': '分钟',
        'reader-updated': '更新于',
        'reader-pinned': '置顶',
        'footer-copy': 'Copyright © 2026 路易的博客',
        'not-found-title': '没找到这篇文章',
        'not-found-desc': '可能链接已失效，回到列表试试看。',
        'not-found-back': '回到博客列表'
      },
      en: {
        'blog-greeting': 'notes',
        'blog-title': 'Blog',
        'blog-sub': "Louie's blog & articles",
        'blog-tag-all': 'All',
        'blog-empty': 'No posts yet — come back soon.',
        'reader-back': 'All posts',
        'reader-min': 'min',
        'reader-updated': 'Updated',
        'reader-pinned': 'Pinned',
        'footer-copy': 'Copyright © 2026 Louie’s Blog',
        'not-found-title': 'Post not found',
        'not-found-desc': 'The link may have changed. Go back to the list and try again.',
        'not-found-back': 'Back to blog'
      }
    };

    let currentLang = 'en';
    const userBrowserLang = navigator.language.toLowerCase();
    if (userBrowserLang === 'zh-cn' || userBrowserLang === 'zh') currentLang = 'zh';
    try {
      const saved = localStorage.getItem('louie-lang');
      if (saved === 'zh' || saved === 'en') currentLang = saved;
    } catch(e) {}

    function applyLang(lang) {
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'zh' ? 'EN' : '中';
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      try { localStorage.setItem('louie-lang', lang); } catch(e) {}
      route(); 
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLang(currentLang);
    }

    /* ─── Fade-in observer ─── */
    let fadeObserver = null;
    function bindFadeIn() {
      if (fadeObserver) fadeObserver.disconnect();
      fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.05 });
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => fadeObserver.observe(el));
    }

    /* ─── TOC sidebar ─── */
    let _tocObserver = null;

    function buildToc() {
      const sidebar = document.getElementById('toc-sidebar');
      const body    = document.getElementById('reader-body');
      if (!sidebar || !body) return;

      if (_tocObserver) { _tocObserver.disconnect(); _tocObserver = null; }

      const headings = Array.from(body.querySelectorAll('h2, h3'));
      if (headings.length < 2) {
        sidebar.innerHTML = '';
        sidebar.classList.remove('md:flex');
        return;
      }

      const used = {};
      headings.forEach(h => {
        let base = h.textContent.trim().replace(/[^\w一-鿿\s]/g, '').trim().replace(/\s+/g, '-').toLowerCase() || h.tagName.toLowerCase();
        let id = base;
        if (used[id] !== undefined) { used[id]++; id = `${base}-${used[id]}`; }
        else used[id] = 0;
        h.id = id;
      });

      const label = currentLang === 'zh' ? '目录' : 'Contents';
      
      // 强制 shrink-0，避免 flex 容器挤压内部元素
      sidebar.innerHTML =
        `<div class="shrink-0 text-xs tracking-[0.15em] uppercase text-m3-onSurfaceVariant font-bold px-3 pb-3 mb-2 border-b border-m3-outlineVariant/50">${label}</div>` +
        headings.map(h => {
          const isH3 = h.tagName.toLowerCase() === 'h3';
          return `<a class="toc-link shrink-0 ripple-surface ripple-surface-variant block w-full py-1.5 px-3 border-l-2 border-transparent text-[13px] transition-colors hover:bg-m3-surfaceContainerHigh hover:text-m3-onSurface ${isH3 ? 'pl-6 text-m3-onSurfaceVariant/70 text-[12px]' : 'text-m3-onSurfaceVariant'}" href="#${h.id}">${h.textContent.trim()}</a>`;
        }).join('');
      
      sidebar.classList.add('md:flex');
      
      bindRipples();

      sidebar.querySelectorAll('.toc-link').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const target = document.getElementById(a.getAttribute('href').slice(1));
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      const links = sidebar.querySelectorAll('.toc-link');
      _tocObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            links.forEach(a => {
              a.classList.remove('text-m3-primary', 'border-m3-primary', 'bg-m3-primaryContainer/20', 'opacity-100');
            });
            const cur = sidebar.querySelector(`.toc-link[href="#${entry.target.id}"]`);
            if (cur) cur.classList.add('text-m3-primary', 'border-m3-primary', 'bg-m3-primaryContainer/20', 'opacity-100');
          }
        });
      }, { rootMargin: '-10% 0px -80% 0px' });
      headings.forEach(h => _tocObserver.observe(h));
    }

    function clearToc() {
      const sidebar = document.getElementById('toc-sidebar');
      if (sidebar) { sidebar.innerHTML = ''; sidebar.classList.remove('md:flex'); }
      if (_tocObserver) { _tocObserver.disconnect(); _tocObserver = null; }
    }

    /* ─── Manifest loading ─── */
    let manifest = { posts: [] };
    let activeTag = '__all';

    function loadManifest() {
      const m = window.__BLOG_MANIFEST;
      if (!m) {
        console.error('blog_data/manifest.js did not register window.__BLOG_MANIFEST');
        manifest = { posts: [] };
        return;
      }
      manifest = {
        ...m,
        posts: (m.posts || [])
          .filter(p => !p.draft)
          .sort((a, b) => {
            const pa = a.pinned ? 1 : 0;
            const pb = b.pinned ? 1 : 0;
            if (pa !== pb) return pb - pa;
            return (b.date || '').localeCompare(a.date || '');
          })
      };
    }

    function pickLang(field, fallback = '') {
      if (field == null) return fallback;
      if (typeof field === 'string') return field;
      return field[currentLang] || field.en || field.zh || fallback;
    }

    function formatDate(iso) {
      if (!iso) return '';
      try {
        const d = luxon.DateTime.fromISO(iso).setLocale(currentLang === 'zh' ? 'zh-CN' : 'en');
        return d.toFormat(currentLang === 'zh' ? 'yyyy.MM.dd' : 'LLL d, yyyy');
      } catch (e) { return iso; }
    }

    function postCoverUrl(post) {
      if (!post.cover) return null;
      return `blog_data/${post.slug}/${post.cover}`;
    }

    /* ─── Tag bar ─── */
    function renderTagBar() {
      const bar = document.getElementById('tag-bar');
      const tags = new Set();
      manifest.posts.forEach(p => (p.tags || []).forEach(t => tags.add(t)));
      const allLabel = translations[currentLang]['blog-tag-all'] || 'All';
      
      const renderBtn = (tag, label, active) => `
        <button class="ripple-surface ripple-surface-variant px-4 py-1.5 rounded-m3-full text-[13px] font-medium transition-colors border border-m3-outlineVariant ${active ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer border-m3-primary/30' : 'bg-m3-surfaceContainer text-m3-onSurfaceVariant hover:bg-m3-surfaceContainerHigh hover:text-m3-onSurface'}" data-tag="${tag}">${label}</button>
      `;

      bar.innerHTML = renderBtn('__all', allLabel, activeTag === '__all') +
        [...tags].sort().map(t => renderBtn(t, t, activeTag === t)).join('');
      
      bar.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTag = btn.dataset.tag;
          renderTagBar();
          renderList();
        });
      });
      bindRipples();
    }

    /* ─── List view ─── */
    function renderList() {
      const list = document.getElementById('blog-list');
      const empty = document.getElementById('blog-empty');
      const filtered = activeTag === '__all'
        ? manifest.posts
        : manifest.posts.filter(p => (p.tags || []).includes(activeTag));

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const tt = translations[currentLang];
      list.innerHTML = filtered.map(post => {
        const cover = postCoverUrl(post);
        const initial = (pickLang(post.title) || post.slug).trim().charAt(0).toUpperCase();
        
        const coverHtml = cover
          ? `<div class="w-full sm:w-40 sm:h-40 h-56 shrink-0 rounded-m3-md overflow-hidden bg-m3-surface flex items-center justify-center border border-m3-outlineVariant/50"><img src="${cover}" alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'text-3xl font-bold text-m3-primary/50\\'>${initial}</span>'"></div>`
          : `<div class="w-full sm:w-40 sm:h-40 h-56 shrink-0 rounded-m3-md bg-m3-primaryContainer/10 flex items-center justify-center border border-m3-primary/10"><span class="text-3xl font-bold text-m3-primary/50">${initial}</span></div>`;
        
        const tagsHtml = (post.tags || []).map(t => `<span class="px-2.5 py-0.5 rounded-m3-sm text-[11px] font-mono text-m3-primary bg-m3-primaryContainer/30 border border-m3-primary/20">${t}</span>`).join('');
        const minLabel = tt['reader-min'] || 'min';
        
        const updatedHtml = (post.updated && post.updated !== post.date)
          ? `<span class="w-1 h-1 rounded-full bg-m3-onSurfaceVariant/50"></span><span class="italic">${tt['reader-updated']} ${formatDate(post.updated)}</span>`
          : '';
          
        const pinHtml = post.pinned
          ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-m3-full text-[10px] font-bold uppercase tracking-widest text-m3-primary bg-m3-primaryContainer/40 border border-m3-primary/30"><svg width="10" height="10" class="rotate-[20deg]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>${tt['reader-pinned']}</span>`
          : '';

        return `
          <a class="ripple-surface group m3-card flex flex-col sm:flex-row gap-6 bg-m3-surfaceContainer rounded-m3-xl p-6 md:p-8 border border-m3-outlineVariant fade-in ${post.pinned ? 'border-m3-primary/30 bg-[#352c28]' : ''}" href="#${post.slug}">
            ${coverHtml}
            <div class="flex flex-col min-w-0 py-1">
              <div class="flex flex-wrap items-center gap-3 text-xs text-m3-onSurfaceVariant tracking-wider mb-3">
                ${pinHtml}
                <span class="font-bold text-m3-primary tabular-nums">${formatDate(post.date)}</span>
                ${updatedHtml}
                ${post.readingTime ? `<span class="w-1 h-1 rounded-full bg-m3-onSurfaceVariant/50"></span><span>${post.readingTime} ${minLabel}</span>` : ''}
              </div>
              <h2 class="text-2xl font-bold text-m3-onSurface leading-snug mb-3 group-hover:text-m3-primary transition-colors">${pickLang(post.title)}</h2>
              <p class="text-sm text-m3-onSurfaceVariant leading-relaxed line-clamp-2 mb-4 flex-grow">${pickLang(post.excerpt)}</p>
              ${tagsHtml ? `<div class="flex flex-wrap gap-2 mt-auto">${tagsHtml}</div>` : ''}
            </div>
          </a>
        `;
      }).join('');
      bindFadeIn();
      bindRipples();
    }

    /* ─── Post body loader ─── */
    const _bodyLoading = {};
    function loadPostBody(slug, lang) {
      const key = `${slug}:${lang}`;
      const cached = (window.__BLOG_POSTS || {})[key];
      if (cached != null) return Promise.resolve(cached);
      if (_bodyLoading[key]) return _bodyLoading[key];

      _bodyLoading[key] = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = `blog_data/${slug}/post.${lang}.js`;
        script.async = false;
        script.onload = () => {
          delete _bodyLoading[key];
          const body = (window.__BLOG_POSTS || {})[key];
          if (body != null) resolve(body);
          else reject(new Error(`Missing window.__BLOG_POSTS['${key}']`));
        };
        script.onerror = () => { delete _bodyLoading[key]; reject(new Error(`Failed to load ${script.src}`)); };
        document.head.appendChild(script);
      });
      return _bodyLoading[key];
    }

    /* ─── Reader view ─── */
    async function renderReader(slug) {
      const post = manifest.posts.find(p => p.slug === slug);
      const reader = document.getElementById('reader-content');
      const t = translations[currentLang];

      if (!post) {
        reader.innerHTML = `
          <div class="text-center py-20 fade-in">
            <h2 class="text-2xl font-bold text-m3-onSurface mb-4">${t['not-found-title']}</h2>
            <p class="text-m3-onSurfaceVariant mb-8">${t['not-found-desc']}</p>
            <a class="ripple-surface bg-m3-primaryContainer text-m3-onPrimaryContainer px-6 py-2.5 rounded-m3-full font-bold" href="#">${t['not-found-back']} →</a>
          </div>
        `;
        requestAnimationFrame(() => {
          const wrapper = reader.querySelector('.fade-in');
          if (wrapper) wrapper.classList.add('visible');
        });
        bindRipples();
        return;
      }

      const tagsHtml = (post.tags || []).map(t => `<span class="px-3 py-1 rounded-m3-sm text-[12px] font-mono text-m3-primary bg-m3-primaryContainer/30 border border-m3-primary/20">${t}</span>`).join('');
      const minLabel = t['reader-min'];
      const cover = postCoverUrl(post);
      
      const updatedHtml = (post.updated && post.updated !== post.date)
        ? `<span class="w-1 h-1 rounded-full bg-m3-onSurfaceVariant/50"></span><span class="italic">${t['reader-updated']} ${formatDate(post.updated)}</span>`
        : '';
        
      const pinHtml = post.pinned
        ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-m3-full text-[10px] font-bold uppercase tracking-widest text-m3-primary bg-m3-primaryContainer/40 border border-m3-primary/30"><svg width="10" height="10" class="rotate-[20deg]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>${t['reader-pinned']}</span>`
        : '';

      reader.innerHTML = `
        <div class="fade-in">
          <div class="flex flex-wrap items-center gap-3 text-sm text-m3-onSurfaceVariant tracking-wider mb-6">
            ${pinHtml}
            <span class="font-bold text-m3-primary tabular-nums">${formatDate(post.date)}</span>
            ${updatedHtml}
            ${post.readingTime ? `<span class="w-1 h-1 rounded-full bg-m3-onSurfaceVariant/50"></span><span>${post.readingTime} ${minLabel}</span>` : ''}
          </div>
          
          <h1 class="text-4xl md:text-5xl font-extrabold text-m3-onSurface leading-tight mb-8">${pickLang(post.title)}</h1>
          ${tagsHtml ? `<div class="flex flex-wrap gap-2 mb-12">${tagsHtml}</div>` : ''}
          
          ${cover ? `<div class="w-full rounded-m3-xl overflow-hidden border border-m3-outlineVariant mb-14 shadow-xl shadow-black/30"><img src="${cover}" class="w-full h-auto object-cover" alt=""></div>` : ''}
          
          <div class="reader-body" id="reader-body"><p class="text-m3-onSurfaceVariant/50 italic">…</p></div>
          
          <div class="flex flex-wrap items-center justify-between gap-4 mt-24 pt-8 border-t border-m3-outlineVariant">
            <span class="text-sm text-m3-onSurfaceVariant">— ${formatDate(post.date)}${(post.updated && post.updated !== post.date) ? ` · ${t['reader-updated']} ${formatDate(post.updated)}` : ''}</span>
            <a class="ripple-surface ripple-surface-variant bg-m3-surfaceContainer hover:bg-m3-surfaceContainerHigh text-m3-onSurface px-5 py-2 rounded-m3-full text-sm font-bold border border-m3-outline transition-colors" href="#">${t['reader-back']} →</a>
          </div>
        </div>
      `;
      
      requestAnimationFrame(() => {
        const wrapper = reader.querySelector('.fade-in');
        if (wrapper) wrapper.classList.add('visible');
      });
      bindRipples();

      const lang = post.lang || 'both';
      const wantedLang = (lang === 'both') ? currentLang : lang;

      function writeBody(html) {
        const el = document.getElementById('reader-body');
        if (!el || el.dataset.slug !== slug) return false;
        el.innerHTML = html;
        return true;
      }

      const bodyEl = document.getElementById('reader-body');
      if (bodyEl) bodyEl.dataset.slug = slug;

      try {
        let html = await loadPostBody(slug, wantedLang);
        if (!html) {
          if (window.__BLOG_POSTS) delete window.__BLOG_POSTS[`${slug}:${wantedLang}`];
          html = await loadPostBody(slug, wantedLang);
        }
        writeBody(html);
        buildToc();
      } catch (e) {
        if (lang === 'both') {
          const altLang = wantedLang === 'zh' ? 'en' : 'zh';
          try {
            const html = await loadPostBody(slug, altLang);
            writeBody(html);
            buildToc();
            return;
          } catch (_) {}
        }
        const el = document.getElementById('reader-body');
        if (el && el.dataset.slug === slug) {
          el.innerHTML = `
            <p class="text-red-400">Failed to load post body.</p>
            <pre class="bg-m3-surfaceContainer p-4 rounded-m3-md border border-m3-outlineVariant overflow-auto"><code class="text-m3-onSurface text-xs">${String(e).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c])}</code></pre>
          `;
        }
      }
    }

    /* ─── Router ─── */
    function route() {
      const slug = location.hash.replace(/^#/, '').trim();
      const list = document.getElementById('view-list');
      const reader = document.getElementById('view-reader');
      if (slug) {
        list.style.display = 'none';
        reader.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'instant' });
        renderReader(slug);
      } else {
        reader.style.display = 'none';
        list.style.display = 'block';
        clearToc();
        renderTagBar();
        renderList();
      }
    }

    window.addEventListener('hashchange', route);

    /* ─── Boot ─── */
    loadManifest();
    applyLang(currentLang);
    bindFadeIn();
  </script>
</body>
</html>
