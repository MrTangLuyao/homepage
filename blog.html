<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Louie's Blog — dev logs, notes, and small experiments">
  <title>Louie — Blog</title>
  <link rel="icon" href="lib/resources/po.webp">
  <link rel="stylesheet" href="lib/design/fonts.css">
  <link rel="stylesheet" href="lib/design/louie.css">
  <link rel="stylesheet" href="blog/blog.css">
  <script src="lib/design/tailwindcss.js"></script>
  <script src="lib/design/tailwind.config.js"></script>
</head>
<body class="min-h-screen flex flex-col">

  <nav id="navbar">
    <div class="nav-brand-wrap" id="brand-dropdown-container">
      <button id="brand-dropdown-btn" class="ripple-surface" type="button">
        <span class="b-static">louie</span><span class="b-dot">.</span><span class="b-page">blog</span>
        <svg id="brand-dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div id="brand-dropdown-menu">
        <a href="index.html" class="nav-dd-item ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--muted)">home</span></a>
        <a href="blog.html" class="nav-dd-item nav-active ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--accent);font-weight:600">blog</span></a>
        <a href="learn.html" class="nav-dd-item ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--muted)">learn</span></a>
        <a href="95.html" class="nav-dd-item ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--muted)">95</span></a>
      </div>
    </div>
    <div class="nav-right">
      <button id="lang-toggle" class="ripple-surface" onclick="toggleLang()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
        <span id="lang-label">EN ⇄ 文</span>
      </button>
    </div>
  </nav>

  <!-- TOC FAB (bottom-left, mobile/tablet only) -->
  <button id="toc-fab" aria-label="Table of contents">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="0.8" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="0.8" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="0.8" fill="currentColor" stroke="none"/></svg>
  </button>

  <!-- Mobile TOC drawer -->
  <div id="mobile-toc">
    <div id="mobile-toc-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #3a3a39;">
        <span id="mobile-toc-title" style="font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:#a1a1a0; font-weight:700;">Contents</span>
        <button id="mobile-toc-close" class="ripple-surface" style="background:none; border:none; color:#a1a1a0; cursor:pointer; padding:6px; border-radius:9999px; display:flex; align-items:center; justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <nav id="mobile-toc-nav" style="display:flex; flex-direction:column;"></nav>
    </div>
  </div>

  <main class="flex-grow pt-28 pb-20 px-6 max-w-4xl w-full mx-auto relative z-10">
    <!-- LIST VIEW -->
    <div id="view-list">
      <div class="mb-14 fade-in">
        <p class="text-m3-primary font-bold tracking-widest uppercase mb-4 text-xs flex items-center gap-3 before:w-8 before:h-[2px] before:bg-m3-primary" data-i18n="blog-greeting">notes</p>
        <h1 class="text-4xl md:text-5xl font-extrabold leading-tight text-m3-onSurface mb-3" data-i18n="blog-title">Blog</h1>
        <p class="text-m3-onSurfaceVariant text-[17px]" data-i18n="blog-sub">Louie 的博客及文章</p>
      </div>

      <!-- M3 Filter Chips -->
      <div class="flex flex-wrap gap-3 py-6 mb-8 border-y border-m3-outlineVariant fade-in" id="tag-bar">
        <!-- JS rendered -->
      </div>

      <div class="grid gap-6" id="blog-list">
        <!-- JS rendered -->
      </div>

      <div class="text-center py-20 text-m3-onSurfaceVariant text-sm" id="blog-empty" style="display:none;" data-i18n="blog-empty">
        No posts yet — come back soon.
      </div>
    </div>

    <!-- READER VIEW -->
    <article id="view-reader" style="display:none;" class="w-full">
      <!-- M3 Fixed Sidebar TOC -->
      <!-- 移除干扰定位的内联 style，完全由 CSS 接管 -->
      <nav id="toc-sidebar" aria-label="Table of contents" class="hidden flex-col z-50 bg-m3-surfaceContainer/90 backdrop-blur border border-m3-outlineVariant rounded-m3-xl p-4 shadow-lg shadow-black/20">
        <!-- JS rendered -->
      </nav>

      <a href="#" class="ripple-surface ripple-surface-variant inline-flex items-center gap-2 px-5 py-2 mb-10 rounded-m3-full text-sm font-medium text-m3-onSurfaceVariant border border-m3-outline hover:text-m3-onSurface hover:bg-m3-surfaceContainerHigh transition-colors" id="reader-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span data-i18n="reader-back">All posts</span>
      </a>

      <div id="reader-content" class="w-full">
        <!-- JS rendered -->
      </div>
    </article>
  </main>

  <footer class="text-center py-10 mt-auto border-t border-m3-outlineVariant bg-m3-surfaceContainer/30">
    <div class="text-sm text-m3-onSurfaceVariant tracking-widest font-mono" data-i18n="footer-copy">
      Copyright © 2026 Louie’s Blog
    </div>
  </footer>

  <script src="lib/runtime/luxon.min.js"></script>
  <script src="blog/blog_data/manifest.js"></script>
  <script src="blog/blog-i18n.js"></script>
  <script src="blog/blog-core.js"></script>
  <script src="blog/blog-toc.js"></script>
  <script src="blog/blog-views.js"></script>
  <script src="blog/blog-router.js"></script>
</body>
</html>
