<!doctype html>
<html><head>
<meta charset="utf-8">
<title>diag</title>
<style>
  body { background:#000; color:#9f9; font: 11px ui-monospace, monospace; padding: 6px; margin:0; }
  pre { white-space: pre-wrap; word-break: break-all; }
  iframe { width: 100%; height: 60vh; border: 1px solid #333; margin-top: 6px; }
  .err { color: #f88; }
  .ok  { color: #8f8; }
  .info{ color: #8cf; }
  hr { border-color: #333; }
</style>
</head>
<body>
<div id="log"><pre id="logp"></pre></div>
<hr>
<iframe id="frame" src="learn.html#c/1"></iframe>

<script>
const logp = document.getElementById('logp');
function log(s, cls) {
  const t = new Date().toISOString().slice(11,19);
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = `[${t}] ${s}\n`;
  logp.appendChild(span);
}

log('boot — about to load iframe with /learn.html#c/1', 'info');

// Hook into iframe to capture window.onerror + console.error
const frame = document.getElementById('frame');
frame.addEventListener('load', () => {
  log('iframe loaded — patching error handlers', 'info');
  const w = frame.contentWindow;
  w.addEventListener('error', (e) => {
    log('ERROR: ' + e.message + ' @ ' + (e.filename||'?') + ':' + (e.lineno||'?') + ':' + (e.colno||'?'), 'err');
    if (e.error && e.error.stack) log('  stack: ' + e.error.stack.split('\n').slice(0,4).join(' | '), 'err');
  });
  w.addEventListener('unhandledrejection', (e) => {
    const r = e.reason;
    log('UNHANDLED REJECTION: ' + (r && r.stack || r && r.message || String(r)), 'err');
  });

  const origConsoleError = w.console.error;
  w.console.error = function(...args) {
    log('console.error: ' + args.map(a => {
      try { return typeof a === 'string' ? a : (a && a.stack ? a.stack : JSON.stringify(a)); }
      catch(_) { return String(a); }
    }).join(' '), 'err');
    return origConsoleError.apply(w.console, args);
  };
  const origConsoleWarn = w.console.warn;
  w.console.warn = function(...args) {
    log('console.warn: ' + args.map(a => typeof a === 'string' ? a : (a && a.message || String(a))).join(' '), 'err');
    return origConsoleWarn.apply(w.console, args);
  };

  // After 3s, probe iframe DOM state
  setTimeout(() => {
    try {
      const d = frame.contentDocument;
      const wrap = d.getElementById('lesson-content');
      const monacoEl = d.querySelector('.monaco-editor');
      const cEditor = d.getElementById('c-editor');
      const cTerm = d.getElementById('c-terminal');
      const btnReset = d.getElementById('btn-reset');
      const btnPre = d.getElementById('btn-preinput-toggle');
      log('--- DOM probe at +3s ---', 'info');
      log('lesson-content exists: ' + !!wrap, wrap ? 'ok' : 'err');
      if (wrap) log('lesson-content child count: ' + wrap.children.length);
      log('#c-editor exists: ' + !!cEditor + (cEditor ? ('  rect=' + JSON.stringify(cEditor.getBoundingClientRect())) : ''), cEditor ? 'ok' : 'err');
      log('.monaco-editor exists: ' + !!monacoEl, monacoEl ? 'ok' : 'err');
      log('#c-terminal exists: ' + !!cTerm, cTerm ? 'ok' : 'err');
      log('#btn-reset exists: ' + !!btnReset, btnReset ? 'ok' : 'err');
      log('#btn-preinput-toggle exists: ' + !!btnPre, btnPre ? 'ok' : 'err');
      log('typeof window.createLessonTerminal: ' + typeof w.createLessonTerminal);
      log('typeof window.Terminal: ' + typeof w.Terminal);
      log('typeof window.monaco: ' + typeof w.monaco);
    } catch (e) {
      log('probe threw: ' + e.message, 'err');
    }
  }, 3000);

  setTimeout(() => {
    try {
      const d = frame.contentDocument;
      const monacoEl = d.querySelector('.monaco-editor');
      log('--- DOM probe at +8s ---', 'info');
      log('.monaco-editor at +8s: ' + !!monacoEl, monacoEl ? 'ok' : 'err');
      const editorPane = d.querySelector('.editor-pane');
      if (editorPane) {
        log('editor-pane rect: ' + JSON.stringify(editorPane.getBoundingClientRect()));
      }
    } catch(e) { log('probe2 threw: ' + e.message, 'err'); }
  }, 8000);
});
</script>
</body></html>
