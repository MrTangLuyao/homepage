  <main id="main">
    <!-- COURSE LIST VIEW -->
    <div id="view-courses">
      <div class="learn-hero fade-in">
        <p class="learn-hero-greeting" data-i18n="learn-greeting">interactive · code to win</p>
        <h1 class="learn-hero-title" data-i18n="learn-title">Learn</h1>
        <p class="learn-hero-sub" data-i18n="learn-sub">闯关式学语法。每节课都用真实代码解决一个小任务，过关再下一关。</p>
      </div>

      <div class="course-list" id="course-list"></div>
    </div>

    <!-- COURSE (lesson list) VIEW -->
    <div id="view-course" style="display:none;">
      <a href="#" class="course-back ripple-surface" id="course-back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span data-i18n="course-back">All courses</span>
      </a>
      <div id="course-content"></div>
    </div>

    <!-- LESSON VIEW -->
    <div id="view-lesson" style="display:none;">
      <div id="lesson-top-bar">
        <a href="#" class="lesson-back ripple-surface" id="lesson-back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          <span data-i18n="lesson-back">Lessons</span>
        </a>
        <div id="lesson-nav-bar"></div>
      </div>
      <div id="lesson-content"></div>
    </div>
  </main>

  <footer>
    <span data-i18n="footer-copy">Copyright © 2026 路易的学习室</span>
  </footer>

  <!-- C-family resource warning modal. Hidden by default; opened by
       gateCFamilyAccess() in learn-core.js before any C-family course route. -->
  <div id="c-resources-modal" class="m3-modal" hidden>
    <div class="m3-modal-backdrop"></div>
    <div class="m3-modal-card" role="dialog" aria-labelledby="c-modal-title">
      <h2 class="m3-modal-title" id="c-modal-title">
        <span class="warn-glyph">⚠</span>
        <span id="c-modal-title-text" data-i18n="c-modal-title">你正在尝试访问 C 语言相关的资源</span>
      </h2>
      <div class="m3-modal-body" id="c-modal-body"></div>
      <div class="m3-modal-actions">
        <button class="btn btn-ghost ripple-surface" id="c-modal-cancel" data-i18n="c-modal-cancel">取消</button>
        <button class="btn btn-primary ripple-surface" id="c-modal-confirm" data-i18n="c-modal-confirm">加载资源</button>
      </div>
    </div>
  </div>

  <script src="lib/runtime/sql-asm.js"></script>
