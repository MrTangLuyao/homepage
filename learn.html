<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Louie's Learn — interactive language tutorials with code-the-answer challenges">
  <title>Louie — Learn</title>
  <link rel="icon" href="lib/po.webp">
  <link rel="stylesheet" href="lib/fonts.css">
  <script src="lib/tailwindcss.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06060a;
      --surface: #0e0e14;
      --border: #1c1c28;
      --text: #e8e8e8;
      --muted: #7a7a8c;
      --accent: #d98c70;
      --accent-dim: rgba(217, 140, 112, 0.08);
      --accent2: #8b70d9;
      --accent2-dim: rgba(139, 112, 217, 0.06);
      --glow: rgba(217, 140, 112, 0.12);
      --ok: #6dc198;
      --err: #d96e6e;
    }

    html { scroll-behavior: smooth; background-color: var(--bg); overscroll-behavior: none; }

    body {
      background-color: transparent;
      color: var(--text);
      font-family: 'JetBrains Mono', 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 16px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      overscroll-behavior: none;
      -webkit-user-select: text;
      user-select: text;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    img, a { -webkit-user-drag: none; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(217, 140, 112, 0.3); border-radius: 2px; }

    /* ─── BACKGROUND ─── */
    #bg-layer { position: fixed; inset: 0; z-index: -2; background: var(--bg); }
    #bg-layer::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 20% 20%, rgba(217, 140, 112, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 75%, rgba(139, 112, 217, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 10%, rgba(112, 170, 217, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 10% 85%, rgba(217, 140, 112, 0.04) 0%, transparent 60%);
      animation: auroraShift 18s ease-in-out infinite alternate;
    }
    #bg-layer::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 30%, transparent 100%);
    }
    @keyframes auroraShift {
      0%   { opacity: 1; transform: scale(1) rotate(0deg); }
      50%  { opacity: 0.7; transform: scale(1.06) rotate(1deg); }
      100% { opacity: 1; transform: scale(1.02) rotate(-0.5deg); }
    }

    #grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      z-index: -1; opacity: 0.028; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: grainMove 0.4s steps(1) infinite;
    }
    @keyframes grainMove {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3%, -5%); }
      50%  { transform: translate(5%, 2%); }
      75%  { transform: translate(-2%, 6%); }
      100% { transform: translate(4%, -3%); }
    }

    #scanline {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
      opacity: 0.4;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 48px;
      background: rgba(29, 29, 31, 0.65);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: border-color 0.4s ease, padding 0.4s ease, background 0.4s ease;
    }
    nav.scrolled { padding: 14px 48px; }

    .nav-logo {
      color: var(--text); font-weight: 700; font-size: 18px;
      text-decoration: none; letter-spacing: 0.05em;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex; align-items: center; gap: 36px; list-style: none;
    }
    .lang-toggle {
      background: none; border: 1px solid rgba(217, 140, 112, 0.2);
      color: var(--muted); font-family: inherit; font-size: 13px;
      letter-spacing: 0.1em; padding: 5px 12px; border-radius: 8px;
      cursor: pointer; white-space: nowrap;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    .lang-toggle:hover {
      color: var(--accent); border-color: rgba(217, 140, 112, 0.5);
      background: rgba(217, 140, 112, 0.06);
      box-shadow: 0 0 12px rgba(217, 140, 112, 0.1);
    }

    /* ─── BRAND SWITCHER ─── */
    .page-switcher { position: relative; font-family: inherit; }

    .brand-switcher {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      padding: 6px 10px 6px 8px;
      margin-left: -8px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .brand-switcher:hover,
    .page-switcher.open .brand-switcher {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.06);
    }
    .brand-switcher-static { color: var(--text); }
    .brand-switcher-static .accent { color: var(--accent); }
    .brand-switcher-current {
      color: var(--muted);
      font-weight: 500;
      transition: color 0.25s ease;
    }
    .brand-switcher:hover .brand-switcher-current,
    .page-switcher.open .brand-switcher-current {
      color: var(--accent);
    }
    .brand-switcher-chevron {
      width: 10px; height: 10px;
      align-self: center;
      margin-left: 2px;
      opacity: 0.35;
      color: var(--muted);
      transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .brand-switcher:hover .brand-switcher-chevron { opacity: 0.7; }
    .page-switcher.open .brand-switcher-chevron {
      opacity: 0.85;
      transform: rotate(180deg);
      color: var(--accent);
    }
    .page-switcher-menu {
      position: absolute; top: calc(100% + 8px); left: 0;
      min-width: 170px;
      background: rgba(20, 20, 26, 0.92);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 5px;
      display: flex; flex-direction: column; gap: 2px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(217, 140, 112, 0.04);
      opacity: 0; pointer-events: none;
      transform: translateY(-6px) scale(0.97);
      transform-origin: top left;
      transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10001;
    }
    .page-switcher.open .page-switcher-menu {
      opacity: 1; pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .page-switcher-item {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 8px 12px; border-radius: 8px;
      color: var(--muted); text-decoration: none;
      font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .page-switcher-item:hover { color: var(--text); background: rgba(255, 255, 255, 0.04); }
    .page-switcher-item.active {
      color: var(--text);
      background: rgba(217, 140, 112, 0.08);
    }
    .page-switcher-item .accent { color: var(--accent); }
    .page-switcher-item-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(217, 140, 112, 0.6);
      opacity: 0; transform: scale(0.6);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .page-switcher-item.active .page-switcher-item-dot { opacity: 1; transform: scale(1); }

    /* ─── LAYOUT ─── */
    main { padding: 140px 24px 80px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 10; flex: 1 0 auto; width: 100%; }

    /* Lesson view layout — engineered for independent pane scrolling.
       The whole view is taken out of normal flow with position: fixed so it
       locks to the viewport, and the layout uses CSS Grid (which gives
       definite track heights to the panes) instead of a flex chain. */
    body.lesson-mode { overflow: hidden; }
    body.lesson-mode footer { display: none; }
    /* In lesson mode the nav is permanently in its collapsed/compact state,
       regardless of scroll position. */
    body.lesson-mode nav { padding: 14px 48px; }
    @media (max-width: 768px) {
      body.lesson-mode nav { padding: 14px 24px; }
    }

    body.lesson-mode #view-lesson {
      position: fixed;
      top: 56px;        /* matches collapsed nav height */
      left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      z-index: 5;
    }
    body.lesson-mode #lesson-back-link {
      justify-self: start;
      margin: 36px 0 14px 28px;
    }
    /* The board is the actual two-pane area. Grid with min:0 rows/cols so
       each pane gets a definite size and overflow can clip & scroll. */
    body.lesson-mode #lesson-content {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
    }
    @media (min-width: 1100px) {
      body.lesson-mode #lesson-content {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
      }
    }


    /* ─── HERO (course list) ─── */
    .learn-hero { margin-bottom: 64px; }
    .learn-hero-greeting {
      color: var(--accent); font-size: 13px; letter-spacing: 0.25em;
      text-transform: uppercase; margin-bottom: 20px;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .learn-hero-greeting::before {
      content: ''; display: inline-block; width: 32px; height: 1px;
      background: var(--accent); opacity: 0.6;
    }
    .learn-hero-title {
      display: block;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800; line-height: 1.2; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #FFFFFF 0%, #F0D4B8 100%);
      color: transparent; -webkit-background-clip: text; background-clip: text;
      margin-bottom: 18px;
      padding-bottom: 0.12em;
    }
    .learn-hero-sub {
      color: var(--muted); font-size: 17px; line-height: 1.9; max-width: 600px;
    }

    /* ─── COURSE LIST ─── */
    .course-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

    .course-card {
      background: rgba(35, 35, 37, 0.4);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      padding: 28px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 14px;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, background 0.4s, box-shadow 0.4s;
      position: relative; overflow: hidden;
    }
    .course-card:hover {
      transform: translateY(-3px);
      background: rgba(50, 50, 53, 0.5);
      border-color: rgba(217, 140, 112, 0.18);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
    }
    .course-card-icon {
      font-size: 36px; line-height: 1;
      color: var(--accent); font-weight: 800;
    }
    .course-card-title { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    .course-card-desc { color: var(--muted); font-size: 14px; line-height: 1.7; }
    .course-card-meta {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .course-card-pill {
      font-size: 11px; color: var(--accent);
      background: rgba(217, 140, 112, 0.06);
      padding: 2px 9px; border-radius: 3px;
      border: 1px solid rgba(217, 140, 112, 0.12);
      letter-spacing: 0.05em;
    }
    .course-card-coming {
      filter: grayscale(0.6) opacity(0.55);
      pointer-events: none;
    }

    /* ─── reset-progress button (course list + course detail) ─── */
    .reset-btn {
      position: absolute;
      top: 14px; right: 14px;
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.25);
      color: var(--muted);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      z-index: 2;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .reset-btn svg { width: 14px; height: 14px; transition: transform 0.25s ease; }
    .reset-btn:hover {
      color: var(--err);
      border-color: rgba(217, 110, 110, 0.45);
      background: rgba(217, 110, 110, 0.10);
    }
    .reset-btn:hover svg { transform: rotate(-90deg); }
    .reset-btn-inline {
      position: static;
      width: auto; height: auto;
      padding: 6px 12px 6px 10px;
      gap: 6px;
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .reset-btn-inline:hover { transform: none; }
    .reset-btn-inline svg { width: 13px; height: 13px; }

    /* ─── PLAYGROUND ─── */
    .pg-action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }

    /* ─── COURSE VIEW (lesson list) ─── */
    .course-back, .lesson-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none;
      font-size: 13px; letter-spacing: 0.06em;
      padding: 8px 14px 8px 10px; border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.25s ease;
      margin-bottom: 28px;
    }
    .course-back:hover, .lesson-back:hover {
      color: var(--accent); border-color: rgba(217, 140, 112, 0.3);
      background: rgba(217, 140, 112, 0.06);
      transform: translateX(-2px);
    }

    .course-header { margin-bottom: 36px; }
    .course-header-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800; line-height: 1.2; letter-spacing: -0.025em;
      color: #fff; margin-bottom: 12px;
    }
    .course-header-sub { color: var(--muted); font-size: 15px; line-height: 1.8; max-width: 700px; }

    .course-progress {
      display: flex; align-items: center; gap: 14px;
      margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .progress-bar {
      flex: 1; max-width: 360px;
      height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%; background: linear-gradient(90deg, var(--accent), #f0c0a0);
      transition: width 0.5s ease;
    }

    .lesson-list { display: grid; gap: 10px; }

    .lesson-section-label {
      color: var(--accent); font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 700;
      margin-top: 28px; margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(217, 140, 112, 0.12);
    }
    .lesson-section-label:first-child { margin-top: 0; }

    .lesson-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      background: rgba(35, 35, 37, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      text-decoration: none; color: inherit;
      transition: all 0.25s ease;
    }
    .lesson-row:hover {
      background: rgba(50, 50, 53, 0.45);
      border-color: rgba(217, 140, 112, 0.18);
      transform: translateX(2px);
    }
    .lesson-row-num {
      font-size: 13px; font-weight: 700;
      color: var(--muted); font-variant-numeric: tabular-nums;
    }
    .lesson-row-title { color: var(--text); font-size: 15px; font-weight: 600; }
    .lesson-row-sub { color: var(--muted); font-size: 12px; margin-top: 2px; letter-spacing: 0.03em; }
    .lesson-row-status { display: inline-flex; align-items: center; color: var(--muted); opacity: 0.6; transition: color 0.2s ease, opacity 0.2s ease, transform 0.2s ease; }
    .lesson-row-status svg { width: 18px; height: 18px; }
    .lesson-row:hover .lesson-row-status { color: var(--accent); opacity: 1; transform: translateX(3px); }
    .lesson-row.is-done .lesson-row-status { transform: none; }
    .lesson-row.is-done .lesson-row-num { color: var(--ok); }
    .lesson-row.is-done .lesson-row-status { color: var(--ok); }
    .lesson-row.is-current { border-color: rgba(217, 140, 112, 0.4); background: rgba(217,140,112,0.06); }
    .lesson-row.is-current .lesson-row-num { color: var(--accent); }

    /* ─── LESSON VIEW (full-screen workbench) ─── */
    .lesson-wrap {
      display: grid;
      grid-template-columns: 1fr;
      /* Mobile: stacked, two equal-height rows so each side gets half. */
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: 0;
      height: 100%;
      width: 100%;
    }
    @media (min-width: 1100px) {
      /* Desktop: two side-by-side halves. The single row is forced to fill
         the grid container so neither pane's content can drag the other taller. */
      .lesson-wrap {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: minmax(0, 1fr);
        align-items: stretch;
      }
    }

    /* Lesson-mode panes are direct grid items of #lesson-content. The grid
       gives each pane a definite track size; min-width/height: 0 + overflow:auto
       on the pane itself makes the *pane* the scroll container (not the page). */
    body.lesson-mode .lesson-pane {
      background: rgba(20, 20, 26, 0.55);
      border: none;
      border-radius: 0;
      padding: 22px 26px;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    body.lesson-mode .lesson-pane-left {
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    @media (max-width: 1099px) {
      body.lesson-mode .lesson-pane-left {
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
    }

    /* Right pane vertical layout: task → hint → editor (grows) → buttons →
       result → nav. We use simple block flow + the pane's own scroll. The
       editor area gets a comfortable min-height so it never collapses. */
    .lesson-right { display: block; }
    .lesson-right > * + * { margin-top: 14px; }
    .lesson-right .editor-host { min-height: 200px; }
    .lesson-right .result-box { max-height: 38vh; overflow: auto; }

    /* Hint panel that slides out below the task block when toggled. */
    .hint-panel {
      background: rgba(139, 112, 217, 0.06);
      border: 1px solid rgba(139, 112, 217, 0.18);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 13.5px;
      line-height: 1.7;
    }
    .hint-panel .task-label { color: var(--accent2); margin-bottom: 4px; }

    .lesson-pane {
      background: rgba(20, 20, 26, 0.55);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 26px 28px;
    }
    .lesson-pane h2 {
      font-size: 20px; font-weight: 700; color: #fff;
      letter-spacing: -0.01em; margin-top: 28px; margin-bottom: 12px;
    }
    .lesson-pane h2:first-child { margin-top: 0; }
    .lesson-pane h3 { font-size: 15px; font-weight: 700; color: #fff; margin-top: 20px; margin-bottom: 8px; }
    .lesson-pane p { color: var(--text); font-size: 14.5px; line-height: 1.85; margin-bottom: 10px; }
    .lesson-pane strong { color: var(--accent); font-weight: 700; }
    .lesson-pane em { color: #f0d4b8; }
    .lesson-pane ul, .lesson-pane ol { padding-left: 22px; margin: 6px 0 14px; }
    .lesson-pane li { margin: 4px 0; color: var(--text); font-size: 14.5px; }
    .lesson-pane code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.92em; color: var(--accent);
      background: rgba(217, 140, 112, 0.07);
      padding: 2px 6px; border-radius: 8px;
      border: 1px solid rgba(217, 140, 112, 0.12);
    }
    .lesson-pane pre {
      background: rgba(8, 8, 12, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 14px 18px;
      overflow-x: auto;
      font-size: 13px; line-height: 1.7;
      margin: 10px 0;
    }
    .lesson-pane pre code {
      color: var(--text); background: none;
      padding: 0; border: none; font-size: 13px;
    }
    .lesson-pane blockquote {
      border-left: 3px solid var(--accent);
      padding: 6px 16px; margin: 12px 0;
      color: var(--muted); font-style: italic;
      background: rgba(217, 140, 112, 0.04);
      border-radius: 0 6px 6px 0;
      font-size: 13.5px;
    }

    .lesson-meta-row {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
      font-size: 12px; letter-spacing: 0.04em; color: var(--muted);
      margin-bottom: 14px;
    }
    .lesson-pill {
      color: var(--accent);
      background: rgba(217, 140, 112, 0.06);
      padding: 3px 10px; border-radius: 8px;
      border: 1px solid rgba(217, 140, 112, 0.18);
      font-size: 11px; font-weight: 600;
    }
    .lesson-title {
      font-size: clamp(1.6rem, 3.4vw, 2.2rem);
      font-weight: 800; color: #fff; line-height: 1.2;
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .lesson-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 22px; }

    /* Title + tutorial link share a row, link aligned to the right edge. */
    .lesson-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 8px;
    }
    .lesson-title-row .lesson-title { margin-bottom: 0; flex: 1 1 auto; min-width: 0; }
    .lesson-title-row .tutorial-link { margin-top: 6px; flex: 0 0 auto; white-space: nowrap; }
    @media (max-width: 720px) {
      .lesson-title-row { flex-direction: column; align-items: flex-start; }
      .lesson-title-row .tutorial-link { margin-top: 4px; }
    }

    .tutorial-link {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 18px;
      color: var(--accent); text-decoration: none;
      font-size: 13px; letter-spacing: 0.04em;
      padding: 7px 14px; border-radius: 8px;
      background: rgba(217, 140, 112, 0.06);
      border: 1px solid rgba(217, 140, 112, 0.2);
      transition: all 0.25s ease;
    }
    .tutorial-link svg { transition: transform 0.25s ease; }
    .tutorial-link:hover {
      background: rgba(217, 140, 112, 0.12);
      border-color: rgba(217, 140, 112, 0.4);
    }
    .tutorial-link:hover svg { transform: translate(2px, -2px); }

    /* table block (for tables shown inside the lesson, e.g. schema preview) */
    .lesson-pane table, .data-table {
      width: 100%; border-collapse: collapse;
      font-size: 13px; margin: 10px 0;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; overflow: hidden;
    }
    .lesson-pane th, .data-table th {
      background: rgba(217,140,112,0.10);
      color: var(--accent); font-weight: 700;
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid rgba(217,140,112,0.20);
      font-size: 12px; letter-spacing: 0.02em;
    }
    .lesson-pane td, .data-table td {
      padding: 6px 12px; color: var(--text);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: top;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
    }
    .lesson-pane tr:last-child td, .data-table tr:last-child td { border-bottom: none; }
    .data-table-name {
      color: var(--accent); font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em; margin: 14px 0 4px;
      text-transform: lowercase;
    }
    .data-table-name::before { content: '▸ '; opacity: 0.7; }

    /* ─── TASK / EDITOR ─── */
    .task-block {
      background: rgba(217, 140, 112, 0.05);
      border: 1px solid rgba(217, 140, 112, 0.18);
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }
    .task-label {
      color: var(--accent); font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .task-text { color: var(--text); font-size: 14.5px; line-height: 1.8; }
    .task-text code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.92em; color: var(--accent);
      background: rgba(217, 140, 112, 0.07);
      padding: 1px 6px; border-radius: 8px;
      border: 1px solid rgba(217, 140, 112, 0.12);
    }

    .editor-wrap { position: relative; margin-bottom: 14px; }
    .editor-label {
      display: flex; justify-content: space-between; align-items: center;
      color: var(--muted); font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 700;
      margin-bottom: 8px;
    }
    .editor-actions { display: flex; gap: 6px; }
    .editor-mini-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      font-family: inherit; font-size: 11px;
      letter-spacing: 0.05em; padding: 4px 10px; border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .editor-mini-btn:hover { color: var(--accent); border-color: rgba(217,140,112,0.3); }

    /* Ace editor host */
    .editor-host {
      border: 1px solid rgba(217, 140, 112, 0.18);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .editor-host.is-focused {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(217,140,112,0.08);
    }
    .editor-host .ace_editor {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13.5px;
      line-height: 1.7;
      border-radius: 8px;
    }

    .editor-bar {
      display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      font-family: inherit; cursor: pointer;
      font-size: 13px; font-weight: 600; letter-spacing: 0.03em;
      padding: 9px 18px; border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary {
      background: var(--accent); color: #1a0e08;
      border-color: var(--accent);
    }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(217,140,112,0.25); }
    .btn-ghost {
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      border-color: rgba(255,255,255,0.08);
    }
    .btn-ghost:hover { color: var(--accent); border-color: rgba(217,140,112,0.3); }
    .btn-ok { background: var(--ok); color: #07150e; border-color: var(--ok); }
    .btn-ok:hover { filter: brightness(1.08); }

    .result-box {
      margin-top: 16px;
      background: rgba(8, 8, 12, 0.5);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 14px 16px;
      min-height: 80px;
    }
    .result-status {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .result-status.is-pass { color: var(--ok); }
    .result-status.is-fail { color: var(--err); }
    .result-status.is-info { color: var(--muted); }
    .result-status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 10px currentColor;
    }
    .result-message { color: var(--text); font-size: 13px; margin-bottom: 6px; }
    .result-tables-row { display: grid; gap: 14px; grid-template-columns: 1fr; }
    @media (min-width: 700px) {
      .result-tables-row.has-expected { grid-template-columns: 1fr 1fr; }
    }
    .result-table-wrap { min-width: 0; overflow-x: auto; }
    .result-table-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
    .result-empty { color: var(--muted); font-style: italic; padding: 8px 0; font-size: 13px; }
    .result-error {
      background: rgba(217, 110, 110, 0.08);
      border: 1px solid rgba(217, 110, 110, 0.25);
      color: #f0a8a8;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .c-output-pre {
      background: rgba(8, 8, 12, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 4px 0;
      min-height: 24px;
    }
    .c-output-pre:empty::after { content: '(no output)'; color: var(--muted); font-style: italic; }

    /* C terminal window */
    .c-terminal-win {
      background: rgba(8, 8, 12, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin-top: 10px;
    }
    .c-term-out {
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
      max-height: 40vh;
      overflow-y: auto;
      flex: 1;
    }
    .c-term-out.is-error { color: #f0a8a8; }
    .c-term-in-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
    }
    .c-term-prompt {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      user-select: none;
      flex-shrink: 0;
    }
    .c-term-in {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #d4d4d4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      caret-color: var(--accent);
    }
    .c-term-in::placeholder { color: rgba(255,255,255,0.2); }

    .lesson-nav-foot {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
      margin-top: 28px; padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none;
      font-size: 13px; letter-spacing: 0.04em;
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      transition: all 0.25s ease;
    }
    .nav-btn:hover { color: var(--accent); border-color: rgba(217,140,112,0.3); }
    .nav-btn[aria-disabled="true"] { opacity: 0.35; pointer-events: none; }

    /* ─── FADE IN ─── */
    .fade-in {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .fade-in.visible { opacity: 1; transform: none; }

    /* ─── CURSOR GLOW ─── */
    #cursor-glow {
      position: fixed; width: 400px; height: 400px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      background: radial-gradient(circle, rgba(217, 140, 112, 0.055) 0%, transparent 65%);
      transform: translate(-50%, -50%);
      transition: opacity 0.4s ease;
      will-change: left, top;
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center; padding: 36px 24px;
      color: var(--muted); font-size: 13px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(0, 0, 0, 0.5); letter-spacing: 0.05em;
      position: relative; z-index: 10;
    }

    /* ─── INLINE NAV POINTER HINT ───
       Sits next to "louie.learn" on the top bar, gently nudges left to draw
       the eye toward the page-switcher dropdown. Hidden in lesson mode and
       on narrow screens. */
    .nav-left { display: inline-flex; align-items: center; gap: 14px; }
    .nav-pointer-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.03em;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.7s ease;
    }
    .nav-pointer-hint.show {
      opacity: 0.85;
      /* Whole hint (arrow + text) gently bounces left so the eye is led
         toward the page-switcher dropdown on its left. */
      animation: navPointerNudge 2.6s ease-in-out infinite;
    }
    .nav-pointer-hint .nav-pointer-arrow {
      width: 14px;
      height: 10px;
      flex: 0 0 auto;
      color: var(--muted);
    }
    @keyframes navPointerNudge {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(-6px); }
    }
    body.lesson-mode .nav-pointer-hint { display: none !important; }
    @media (max-width: 880px) { .nav-pointer-hint { display: none; } }

    .not-found {
      text-align: center; padding: 80px 24px;
      color: var(--muted);
    }
    .not-found h2 {
      color: #fff; font-size: 24px; margin-bottom: 12px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      nav.scrolled { padding: 14px 24px; }
      main { padding: 110px 18px 60px; }
      .lesson-pane { padding: 20px 18px; }
      .editor-bar .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>

    let currentLang = 'en';
    const userBrowserLang = navigator.language.toLowerCase();
    if (userBrowserLang === 'zh-cn' || userBrowserLang === 'zh') currentLang = 'zh';
    try {
      const saved = localStorage.getItem('louie-lang');
      if (saved === 'zh' || saved === 'en') currentLang = saved;
    } catch(e) {}

    function applyLang(lang) {
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'zh' ? 'EN' : '中';
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      try { localStorage.setItem('louie-lang', lang); } catch(e) {}
      route();
    }
    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLang(currentLang);
    }

    function tt(key, vars) {
      let s = (translations[currentLang] || translations.en)[key] || key;
      if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
      return s;
    }

    function pickLang(field, fallback = '') {
      if (field == null) return fallback;
      if (typeof field === 'string') return field;
      return field[currentLang] || field.en || field.zh || fallback;
    }

    /* ─── Inline nav-pointer hint ─── */
    (function() {
      const hint = document.getElementById('nav-pointer-hint');
      if (!hint) return;
      // Fade in shortly after load so it's not part of the initial chrome.
      setTimeout(() => hint.classList.add('show'), 600);
      // Fade out after 12s so the user notices it but it doesn't linger.
      setTimeout(() => hint.classList.remove('show'), 12000);
    })();

    /* ─── Nav ─── */
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
    function togglePageSwitcher(e) {
      if (e) e.stopPropagation();
      const sw = document.getElementById('page-switcher');
      if (!sw) return;
      sw.classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      const sw = document.getElementById('page-switcher');
      if (sw && !sw.contains(e.target)) sw.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const sw = document.getElementById('page-switcher');
        if (sw) sw.classList.remove('open');
      }
    });

    /* ─── Cursor glow ─── */
    const cursorGlow = document.getElementById('cursor-glow');
    let cx = -1000, cy = -1000, gcx = -1000, gcy = -1000;
    window.addEventListener('mousemove', (e) => { cx = e.clientX; cy = e.clientY; });
    function animateGlow() {
      gcx += (cx - gcx) * 0.07; gcy += (cy - gcy) * 0.07;
      cursorGlow.style.left = gcx + 'px';
      cursorGlow.style.top  = gcy + 'px';
      requestAnimationFrame(animateGlow);
    }
    animateGlow();

    /* ─── Fade in ─── */
    let fadeObserver = null;
    function bindFadeIn() {
      if (fadeObserver) fadeObserver.disconnect();
      fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.05 });
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => fadeObserver.observe(el));
    }

    /* ─── Manifest + course loading ─── */
    let manifest = { courses: [] };
    function loadManifest() {
      const m = window.__LEARN_MANIFEST;
      if (!m) {
        console.error('learn_data/manifest.js did not register window.__LEARN_MANIFEST');
        manifest = { courses: [] };
        return;
      }
      manifest = { ...m, courses: (m.courses || []) };
    }

    const _courseLoading = {};
    function loadCourse(slug) {
      const cached = (window.__LEARN_COURSES || {})[slug];
      if (cached) return Promise.resolve(cached);
      if (_courseLoading[slug]) return _courseLoading[slug];
      _courseLoading[slug] = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = `learn_data/${slug}/course.js`;
        script.async = false;
        script.onload = () => {
          delete _courseLoading[slug];
          const c = (window.__LEARN_COURSES || {})[slug];
          if (c) resolve(c);
          else reject(new Error(`${script.src} did not register window.__LEARN_COURSES['${slug}']`));
        };
        script.onerror = () => {
          delete _courseLoading[slug];
          reject(new Error(`Failed to load ${script.src}`));
        };
        document.head.appendChild(script);
      });
      return _courseLoading[slug];
    }

    /* ─── Progress (per course) ─── */
    function progKey(slug) { return `louie-learn:${slug}:done`; }
    function loadProgress(slug) {
      try {
        const v = localStorage.getItem(progKey(slug));
        return v ? JSON.parse(v) : {};
      } catch(e) { return {}; }
    }
    function saveProgress(slug, prog) {
      try { localStorage.setItem(progKey(slug), JSON.stringify(prog)); } catch(e) {}
    }
    function markDone(slug, lessonId) {
      const prog = loadProgress(slug);
      prog[lessonId] = true;
      saveProgress(slug, prog);
    }
    function resetProgress(slug) {
      try { localStorage.removeItem(progKey(slug)); } catch(e) {}
    }
    /* Confirm + wipe localStorage progress for one course. Used both from
       the course list (per-card icon button) and the course detail header. */
    function promptResetCourse(slug, courseTitle) {
      const prog = loadProgress(slug);
      if (Object.keys(prog).length === 0) {
        // Nothing to clear — fall through silently with a soft notice.
        alert(tt('reset-no-progress'));
        return;
      }
      const msg = tt('reset-confirm').replace('{course}', courseTitle);
      if (!confirm(msg)) return;
      resetProgress(slug);
      // Re-render whatever view we're on so the visuals refresh.
      route();
    }

    /* ─── Course list view ─── */
    function renderCourseList() {
      const wrap = document.getElementById('course-list');
      const courses = manifest.courses || [];
      if (courses.length === 0) {
        wrap.innerHTML = `<div class="not-found"><p>${tt('coming-soon')}</p></div>`;
        return;
      }
      wrap.innerHTML = courses.map(c => {
        const isComing = c.coming === true;
        const lessonsLabel = c.lessonsCount ? `${c.lessonsCount} ${tt('lessons-count')}` : '';
        const href = isComing ? '#' : `#${c.slug}`;
        const resetBtn = isComing ? '' : `
          <button class="reset-btn js-reset-btn" data-slug="${c.slug}" type="button" title="${tt('reset-progress')}" aria-label="${tt('reset-progress')}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          </button>`;
        return `
          <a class="course-card fade-in${isComing ? ' course-card-coming' : ''}" href="${href}" style="position: relative;">
            ${resetBtn}
            <div class="course-card-icon">${c.icon || ''}</div>
            <div class="course-card-title">${pickLang(c.title)}</div>
            <div class="course-card-desc">${pickLang(c.desc)}</div>
            <div class="course-card-meta">
              ${lessonsLabel ? `<span class="course-card-pill">${lessonsLabel}</span>` : ''}
              ${c.level ? `<span class="course-card-pill">${pickLang(c.level)}</span>` : ''}
              ${isComing ? `<span class="course-card-pill">${tt('coming-soon')}</span>` : ''}
            </div>
          </a>
        `;
      }).join('');
      // The reset button lives inside the card <a>; intercept clicks before
      // they bubble up and follow the link.
      wrap.querySelectorAll('.js-reset-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          const slug = btn.dataset.slug;
          const course = courses.find(x => x.slug === slug);
          promptResetCourse(slug, pickLang(course ? course.title : slug));
        });
      });
      bindFadeIn();
    }

    /* ─── Course (lesson list) view ─── */
    async function renderCourse(slug) {
      const wrap = document.getElementById('course-content');
      let course;
      try {
        course = await loadCourse(slug);
      } catch (e) {
        wrap.innerHTML = `<div class="not-found"><h2>${tt('not-found-title')}</h2><p>${tt('not-found-desc')}</p><p style="margin-top:18px;"><a class="reader-footer-link" href="#">→ ${tt('not-found-back')}</a></p></div>`;
        return;
      }
      const lessons = course.lessons || [];
      const prog = loadProgress(slug);
      const doneCount = lessons.filter(l => prog[l.id]).length;
      const pct = lessons.length ? Math.round((doneCount / lessons.length) * 100) : 0;

      // Group lessons by section
      const sections = {};
      const sectionOrder = [];
      for (const l of lessons) {
        const sec = l.section || 'main';
        if (!(sec in sections)) { sections[sec] = []; sectionOrder.push(sec); }
        sections[sec].push(l);
      }
      const sectionLabel = (sec) => {
        if (sec === 'final') return tt('final-section');
        if (sec === 'main') return tt('lesson-section');
        return sec;
      };

      const sectionsHtml = sectionOrder.map(sec => {
        const rows = sections[sec].map(l => {
          const isDone = !!prog[l.id];
          return `
            <a class="lesson-row${isDone ? ' is-done' : ''}" href="#${slug}/${l.id}">
              <span class="lesson-row-num">${String(l.id).padStart(2, '0')}</span>
              <div>
                <div class="lesson-row-title">${pickLang(l.title)}</div>
                ${l.chapter ? `<div class="lesson-row-sub">${pickLang(l.chapter)}</div>` : ''}
              </div>
              <span class="lesson-row-status">${isDone
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="9 12 11 14 15 10"></polyline></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>'
              }</span>
            </a>
          `;
        }).join('');
        return `<div class="lesson-section-label">${sectionLabel(sec)}</div>${rows}`;
      }).join('');

      wrap.innerHTML = `
        <div class="fade-in">
          <div class="course-header">
            <h1 class="course-header-title">${pickLang(course.title)}</h1>
            <p class="course-header-sub">${pickLang(course.desc)}</p>
            <div class="course-progress">
              <span>${tt('progress-label')}</span>
              <div class="progress-bar"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
              <span style="font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 700;">${doneCount} / ${lessons.length}</span>
              <button class="reset-btn reset-btn-inline js-reset-course-detail" type="button" title="${tt('reset-progress')}" aria-label="${tt('reset-progress')}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                <span>${tt('reset-progress')}</span>
              </button>
            </div>
          </div>
          <div class="lesson-list">
            ${course.hasPlayground ? `
            <a class="lesson-row" href="#${slug}/playground">
              <span class="lesson-row-num" style="color:var(--accent); display:inline-flex; align-items:center; justify-content:center;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></span>
              <div>
                <div class="lesson-row-title">${course.playgroundTitle ? pickLang(course.playgroundTitle) : tt('playground-label')}</div>
              </div>
              <span class="lesson-row-status"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
            </a>
            ` : ''}
            ${sectionsHtml}
          </div>
        </div>
      `;
      const detailBtn = wrap.querySelector('.js-reset-course-detail');
      if (detailBtn) {
        detailBtn.addEventListener('click', () => {
          promptResetCourse(course.slug, pickLang(course.title));
        });
      }
      requestAnimationFrame(() => {
        const wr = wrap.querySelector('.fade-in');
        if (wr) wr.classList.add('visible');
      });
    }

    /* ─── SQL Playground view ─── */
    async function renderPlayground(courseSlug) {
      const wrap = document.getElementById('lesson-content');
      wrap.innerHTML = `<div class="result-empty" style="padding:80px 24px;">${currentLang === 'zh' ? '加载中…' : 'Loading…'}</div>`;

      let course;
      try {
        course = await loadCourse(courseSlug);
        if (course.type === 'c') await ensureC();
        else await ensureSql();
      } catch(e) {
        wrap.innerHTML = `<div class="not-found"><h2>${tt('not-found-title')}</h2><p>${tt('not-found-desc')}</p><pre style="margin-top:14px;color:var(--err);font-size:12px;">${escapeHtml(String(e.message || e))}</pre></div>`;

      }

        renderCPlayground(course, wrap);

      let playgroundDb = freshDb();

      wrap.innerHTML = `
        <div class="lesson-pane lesson-pane-left fade-in">

          </div>

      `;

      requestAnimationFrame(() => {
        wrap.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
      });

      const schemaContainer = document.getElementById('pg-schema');

      function refreshSchema() {
        let tableNames;
        try {
          const rows = execToRows(playgroundDb, `SELECT name FROM sqlite_master WHERE type='table' ORDER BY name`);
          tableNames = rows.map(r => r.name);
        } catch(e) { tableNames = []; }
        schemaContainer.innerHTML = tableNames.length
          ? renderSchemaPreview(playgroundDb, tableNames)
          : `<div class="result-empty" style="padding:8px 0;">${tt('playground-empty')}</div>`;
      }

      document.getElementById('pg-load-demo').addEventListener('click', () => {
        if (!course.playgroundSetup) return;
        playgroundDb = freshDb();
        try { runSetup(playgroundDb, course.playgroundSetup); } catch(e) {
          schemaContainer.innerHTML = `<div class="result-error">${escapeHtml(e.message || String(e))}</div>`;
          return;
        }
        refreshSchema();
      });

      document.getElementById('pg-reset').addEventListener('click', () => {
        playgroundDb = freshDb();

      const editorHost = document.getElementById('editor-host');
      const resultBox = document.getElementById('result-box');
      const aceEd = ace.edit(document.getElementById('sql-editor'));
      aceEd.setTheme('ace/theme/tomorrow_night');
      aceEd.session.setMode('ace/mode/mysql');
      aceEd.session.setUseWorker(false);
      aceEd.setOptions({ minLines: 8, maxLines: 25, showPrintMargin: false, fontSize: '13px', fontFamily: "'JetBrains Mono', monospace", useSoftTabs: true, tabSize: 2, behavioursEnabled: true, wrap: true });
      aceEd.on('focus', () => editorHost.classList.add('is-focused'));
      aceEd.on('blur',  () => editorHost.classList.remove('is-focused'));
      const editor = { get value() { return aceEd.getValue(); } };

      document.getElementById('btn-run').addEventListener('click', () => {
        const sql = (editor.value || '').trim();
        if (!sql) {
          resultBox.innerHTML = `<div class="result-status is-info"><span class="dot"></span><span>—</span></div><div class="result-message">${tt('msg-empty-query')}</div>`;
          return;
        }
        try {
          const rows = runSingleSelect(playgroundDb, sql);
          resultBox.innerHTML = `<div class="result-status is-info"><span class="dot"></span><span>${tt('result-runonly')}</span></div>${renderResultTable(rows)}`;
        } catch(e) {
          resultBox.innerHTML = `<div class="result-status is-fail"><span class="dot"></span><span>${tt('result-error')}</span></div><div class="result-error">${escapeHtml(e.message || String(e))}</div>`;
        }
        refreshSchema();
      });
    }

    /* ─── C engine (JSCPP, lazy-loaded) ──��� */
    let _jscppReady = null;
    function ensureC() {
      if (_jscppReady) return _jscppReady;
      _jscppReady = new Promise((res, rej) => {
        if (window.JSCPP) { res(window.JSCPP); return; }
        const s = document.createElement('script');
        s.src = 'lib/JSCPP.es5.min.js';
        s.onload = () => window.JSCPP ? res(window.JSCPP) : rej(new Error(tt('c-no-engine')));
        s.onerror = () => rej(new Error('Failed to load C engine'));
        document.head.appendChild(s);
      });
      return _jscppReady;
    }

    function runC(code) {
      // returns a Promise — real interactive terminal via Web Worker + SharedArrayBuffer
      return new Promise((resolve, reject) => {
        if (!window.JSCPP) { reject(new Error(tt('c-no-engine'))); return; }
        if (typeof SharedArrayBuffer === 'undefined') {
          reject(new Error(currentLang === 'zh'
            ? '浏览器不支持 SharedArrayBuffer（需要 HTTPS + 跨域隔离）。'
            : 'SharedArrayBuffer not available. Requires HTTPS + cross-origin isolation.'));
          return;
        }
        const sharedCtrl = new SharedArrayBuffer(16);
        const sharedData = new SharedArrayBuffer(4096);
        const ctrl = new Int32Array(sharedCtrl);
        resolve({ sharedCtrl, sharedData, ctrl });
      });
    }

    function spawnCWorker(code, outputEl, stdinEl) {
      // Returns a Promise<stdout string>
      return new Promise((resolve) => {
        if (typeof SharedArrayBuffer === 'undefined') {
          outputEl.className = 'c-term-out is-error';
          outputEl.textContent = currentLang === 'zh'
            ? '需要通过 HTTPS 访问本站才能使用 C 语言运行功能。'
            : 'Please access via HTTPS to run C code.';
          resolve(null); return;
        }

        const sharedCtrl = new SharedArrayBuffer(16);
        const sharedData = new SharedArrayBuffer(4096);
        const ctrl = new Int32Array(sharedCtrl);

        outputEl.className = 'c-term-out';
        outputEl.textContent = '';

        let stdoutOnly = '';
        const stdinRow = stdinEl?.closest('.c-term-in-row');

        // hide input while running
        if (stdinRow) stdinRow.style.opacity = '0.3';
        if (stdinEl) { stdinEl.disabled = true; stdinEl.value = ''; }

        const worker = new Worker('lib/jscpp-worker.js');
        let pendingInputHandler = null;

        worker.onmessage = (e) => {
          const msg = e.data;
          if (msg.type === 'output') {
            stdoutOnly += msg.text;
            outputEl.textContent += msg.text;
            outputEl.scrollTop = outputEl.scrollHeight;
          } else if (msg.type === 'need-input') {
            // program needs stdin — show input, wait for Enter
            if (stdinRow) stdinRow.style.opacity = '1';
            if (stdinEl) {
              stdinEl.disabled = false;
              stdinEl.focus();
            }
            pendingInputHandler = (evt) => {
              if (evt.key !== 'Enter') return;
              if (!stdinEl) return;
              stdinEl.removeEventListener('keydown', pendingInputHandler);
              pendingInputHandler = null;

              const input = stdinEl.value;
              stdinEl.value = '';
              if (stdinRow) stdinRow.style.opacity = '0.3';
              stdinEl.disabled = true;

              // echo input in terminal
              outputEl.textContent += input + '\n';
              outputEl.scrollTop = outputEl.scrollHeight;

              // send to worker
              const encoded = new TextEncoder().encode(input + '\n');
              new Uint8Array(sharedData).set(encoded);
              Atomics.store(ctrl, 1, encoded.length);
              Atomics.store(ctrl, 0, 1);
              Atomics.notify(ctrl, 0, 1);
            };
            if (stdinEl) stdinEl.addEventListener('keydown', pendingInputHandler);
          } else if (msg.type === 'done' || msg.type === 'error') {
            worker.terminate();
            if (pendingInputHandler && stdinEl)
              stdinEl.removeEventListener('keydown', pendingInputHandler);
            if (stdinRow) stdinRow.style.opacity = '1';
            if (stdinEl) stdinEl.disabled = false;
            if (msg.type === 'error') {
              outputEl.className = 'c-term-out is-error';
              outputEl.textContent += (outputEl.textContent ? '\n' : '') + msg.message;
            }
            resolve(msg.type === 'done' ? stdoutOnly : null);
          }
        };

        worker.onerror = (e) => {
          worker.terminate();
          if (stdinRow) stdinRow.style.opacity = '1';
          if (stdinEl) stdinEl.disabled = false;
          outputEl.className = 'c-term-out is-error';
          outputEl.textContent = e.message || 'Worker error';
          resolve(null);
        };

        worker.postMessage({ type: 'run', code, sharedCtrl, sharedData });
      });
    }

    /* Ace-based C editor mount. Pass lessonCtx to enable Submit/Reset/Answer. */

      async function doRun() {

        }

      }

      const runBtn = document.getElementById('btn-run');
      if (runBtn) runBtn.addEventListener('click', () => { doRun(); });

      if (lessonCtx) {
        const { courseSlug, lessonId, expectedOutput, initial, answer } = lessonCtx;

        const hintBody = document.getElementById('hint-body');

        if (checkBtn) checkBtn.addEventListener('click', async () => {
          const output = await doRun();
          if (output === null) return;
          const norm = s => (s || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
          const passed = norm(output) === norm(expectedOutput || '');
          if (passed) {
            markDone(courseSlug, lessonId);
            resultBox.className = 'c-term-out';
            resultBox.innerHTML = `<span style="color:var(--ok);">✓ ${tt('result-pass')}</span>\n\n${escapeHtml(output)}`;
          } else {
            resultBox.className = 'c-term-out is-error';
            resultBox.innerHTML =
              `<span style="color:#f0a8a8;">✗ ${currentLang === 'zh' ? '输出不匹配' : 'Output mismatch'}</span>\n\n` +
              `<span style="color:rgba(255,255,255,0.4);">${currentLang === 'zh' ? '你的输出:' : 'Your output:'}</span>\n` +
              escapeHtml(output || `(${tt('result-empty')})`) +
              `\n\n<span style="color:rgba(255,255,255,0.4);">${currentLang === 'zh' ? '期望输出:' : 'Expected:'}</span>\n` +
              escapeHtml(expectedOutput || '');
          }
        });

        if (resetBtn) resetBtn.addEventListener('click', () => {
          editor.value = initial;
          resultBox.className = 'c-term-out';
          resultBox.innerHTML = `<span style="color:rgba(255,255,255,0.25);font-style:italic;">${currentLang === 'zh' ? '已重置。' : 'Reset.'}</span>`;
        });

        if (answerBtn) answerBtn.addEventListener('click', () => {
          answerVisible = !answerVisible;
          answerBtn.textContent = answerVisible ? tt('btn-hide-answer') : tt('btn-show-answer');
          if (answer) editor.value = answerVisible ? answer : initial;
        });

        if (hintToggle && hintBody) {
          hintToggle.addEventListener('click', () => {
            const hidden = hintBody.style.display === 'none';
            hintBody.style.display = hidden ? 'block' : 'none';

          });
        }
      }
      return { editor, cm };
    }

    /* ─── SQL engine (sql.js / SQLite, pure JS asm.js build) ─── */
    // sql.js initialises asynchronously. We bootstrap once and queue any DB work
    // until the engine is ready.
    let SQL = null;
    let _sqlReady = null;
    function ensureSql() {
      if (SQL) return Promise.resolve(SQL);
      if (_sqlReady) return _sqlReady;
      _sqlReady = (typeof initSqlJs === 'function' ? initSqlJs() : Promise.reject(new Error('sql.js not loaded')))
        .then(s => { SQL = s; return s; });
      return _sqlReady;
    }
    // Kick off init at boot.
    ensureSql().catch(e => console.error('sql.js init failed:', e));

    function freshDb() {
      if (!SQL) throw new Error('SQL engine not ready');
      return new SQL.Database();
    }

    /* sql.js's `db.exec(sql)` returns an array of result sets, each shaped as
       `{columns: string[], values: any[][]}`. We convert the LAST result set to
       an array of plain objects so the rest of the app (compareRows, render)
       can stay simple.

       Multi-statement scripts (CREATE + INSERT + INSERT...) all execute via the
       same db.exec call — we just return the last SELECT's rows. */
    function execToRows(db, sql) {
      const out = db.exec(sql);
      if (!out || out.length === 0) return [];
      const last = out[out.length - 1];
      const cols = last.columns;
      return last.values.map(v => {
        const row = {};
        for (let i = 0; i < cols.length; i++) row[cols[i]] = v[i];
        return row;
      });
    }
    function runSetup(db, sqlText) {
      // Setup scripts may be empty.
      if (!sqlText || !sqlText.trim()) return;
      db.exec(sqlText);
    }
    function runSingleSelect(db, sql) {
      return execToRows(db, sql);
    }

    /* Compare two row sets: array of plain objects.
       checkOrder: if true, row order must match. */
    function compareRows(actual, expected, checkOrder) {
      if (!Array.isArray(actual)) actual = [];
      if (!Array.isArray(expected)) expected = [];
      if (actual.length !== expected.length) {
        return { ok: false, code: 'rows', got: actual.length, want: expected.length };
      }
      // Normalize: turn each row into a stable serialization. Track column order
      // from the first row.
      function rowKey(row, columnOrder) {
        return columnOrder.map(c => normalizeCell(row[c])).join('');
      }
      function normalizeCell(v) {
        if (v == null) return 'NULL';
        if (typeof v === 'number') {
          // Treat ints and floats consistently; round to 6 dp.
          if (Number.isInteger(v)) return String(v);
          return v.toFixed(6).replace(/\.?0+$/, '');
        }
        return String(v);
      }
      // Determine column set from expected (the source of truth for columns)
      const expectedCols = expected.length > 0 ? Object.keys(expected[0]) : [];
      const actualCols   = actual.length   > 0 ? Object.keys(actual[0])   : [];

      // If no rows on both sides, accept (special-case 0/0).
      if (expected.length === 0 && actual.length === 0) {
        return { ok: true };
      }

      // Column count must match.
      if (expectedCols.length !== actualCols.length) {
        return { ok: false, code: 'cols' };
      }

      // We compare values column-by-column using positional alignment (not by
      // name) to allow learners to alias columns however they like.
      function rowToTuple(row, cols) {
        return cols.map(c => normalizeCell(row[c]));
      }
      const actualTuples   = actual.map(r => rowToTuple(r, actualCols));
      const expectedTuples = expected.map(r => rowToTuple(r, expectedCols));

      if (checkOrder) {
        for (let i = 0; i < expectedTuples.length; i++) {
          for (let j = 0; j < expectedCols.length; j++) {
            if (actualTuples[i][j] !== expectedTuples[i][j]) {
              return { ok: false, code: 'data' };
            }
          }
        }
        return { ok: true };
      } else {
        const sortKey = (t) => t.join('');
        const a = actualTuples.map(sortKey).sort();
        const e = expectedTuples.map(sortKey).sort();
        for (let i = 0; i < a.length; i++) {
          if (a[i] !== e[i]) return { ok: false, code: 'data' };
        }
        return { ok: true };
      }
    }

    /* ─── Render schema preview tables for a lesson ─── */
    function renderSchemaPreview(db, tables) {
      if (!tables || tables.length === 0) return '';
      let html = '';
      for (const tname of tables) {
        try {
          const rows = execToRows(db, `SELECT * FROM ${tname}`);
          html += `<div class="data-table-name">${tname}</div>`;
          html += renderResultTable(rows, true);
        } catch (e) {
          html += `<div class="data-table-name">${tname}</div><div class="result-empty">(could not preview: ${e.message})</div>`;
        }
      }
      return html;
    }

    function renderResultTable(rows, compact) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return `<div class="result-empty">${tt('result-empty')}</div>`;
      }
      const cols = Object.keys(rows[0]);
      const head = cols.map(c => `<th>${escapeHtml(c)}</th>`).join('');
      const body = rows.map(r =>
        '<tr>' + cols.map(c => `<td>${formatCell(r[c])}</td>`).join('') + '</tr>'
      ).join('');
      return `<table class="data-table">
        <thead><tr>${head}</tr></thead>
        <tbody>${body}</tbody>
      </table>`;
    }
    function formatCell(v) {
      if (v == null) return '<span style="color:var(--muted); font-style:italic;">NULL</span>';
      if (typeof v === 'number' && !Number.isInteger(v)) {
        // Trim trailing zeros up to 6 dp
        return escapeHtml(Number(v.toFixed(6)).toString());
      }
      return escapeHtml(String(v));
    }
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    /* ─── Lesson view ─── */
    let _currentLesson = null; // {courseSlug, lessonId, course, lesson, db}

    async function renderLesson(courseSlug, lessonIdRaw) {

        course = await loadCourse(courseSlug);
        if (course.type === 'c') {
          await ensureC();
        } else {
          await ensureSql();
        }
      } catch (e) {
        wrap.innerHTML = `<div class="not-found"><h2>${tt('not-found-title')}</h2><p>${tt('not-found-desc')}</p><pre style="margin-top:18px; color:var(--err); font-size:12px;">${escapeHtml(String(e.message || e))}</pre></div>`;
        return;
      }
      if (course.type === 'c') {
        return renderCLesson(courseSlug, lessonIdRaw, course);
      }

      const lessonId = parseInt(lessonIdRaw, 10);
      const lesson = (course.lessons || []).find(l => l.id === lessonId);

      // Build the lesson DB

      let setupErr = null;

        runSetup(db, lesson.setup);
      } catch (e) {

        console.error('Lesson setup failed:', e);
      }

      // Schema preview HTML
      const schemaHtml = setupErr
        ? `<div class="result-error">Setup failed: ${escapeHtml(setupErr.message || String(setupErr))}</div>`
        : renderSchemaPreview(db, lesson.tables || []);

      // Surrounding nav
      const lessons = course.lessons || [];
      const idx = lessons.findIndex(l => l.id === lessonId);

      const next = idx >= 0 && idx < lessons.length - 1 ? lessons[idx + 1] : null;

      const intro = pickLang(lesson.intro) || '';
      const task  = pickLang(lesson.task) || '';
      const hint  = pickLang(lesson.hint) || '';
      const initialSql = lesson.starter ? pickLang(lesson.starter) : '';

                <span class="lesson-pill">${pickLang(course.title)}</span>
                <span>${tt('lessons-count')} ${String(lesson.id).padStart(2,'0')} / ${String(lessons.length).padStart(2,'0')}</span>
                ${lesson.chapter ? `<span>· ${pickLang(lesson.chapter)}</span>` : ''}
                ${lesson.difficulty ? `<span>· ${tt('difficulty')}: ${pickLang(lesson.difficulty)}</span>` : ''}
              </div>
              <div class="lesson-title-row">
                <h1 class="lesson-title">${pickLang(lesson.title)}</h1>
                ${lesson.chapterRef ? `
                  <a class="tutorial-link" href="blog.html#${lesson.chapterRef}" target="_blank" rel="noopener">
                    <span>${tt('tutorial-link')}</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                      <polyline points="15 3 21 3 21 9"></polyline>
                      <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                  </a>
                ` : ''}
              </div>
              ${lesson.subtitle ? `<p class="lesson-subtitle">${pickLang(lesson.subtitle)}</p>` : ''}

              <div id="lesson-intro">${intro}</div>
              ${(lesson.tables && lesson.tables.length) ? `
                <h2>${tt('tables-label')}</h2>
                <div id="lesson-schema">${schemaHtml}</div>

          <!-- RIGHT pane: task → (hint toggle slides out a body) → editor → result -->

                <div class="task-label">${tt('task-label')}</div>
                <div class="task-text">${task}</div>

              ${hint ? `

                  <div class="task-label">${tt('hint-label')}</div>
                  <div>${hint}</div>

              <div class="editor-wrap">

                    <button class="editor-mini-btn" id="btn-show-answer">${tt('btn-show-answer')}</button>

              <div class="editor-bar">
                <button class="btn btn-ghost" id="btn-run">▶  ${tt('btn-run')}</button>

              <div class="result-box" id="result-box">
                <div class="result-status is-info"><span class="dot"></span><span>—</span></div>
                <div class="result-message" style="color: var(--muted);">${currentLang === 'zh' ? '点击 运行 看你的查询输出，点击 提交 检查答案。' : 'Click Run to see output. Click Submit to check.'}</div>

      // Reveal both panes together with the fade-in animation.
