<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Louie's Learn — interactive language tutorials with code-the-answer challenges">
  <title>Louie — Learn</title>
  <link rel="icon" href="lib/po.webp">
  <link rel="stylesheet" href="lib/fonts.css">
  <script src="lib/tailwindcss.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            m3: {
              surface: '#1f1f1e',
              surfaceContainer: '#2a2a29',
              surfaceContainerHigh: '#333332',
              primary: '#d97757',
              onPrimary: '#ffffff',
              primaryContainer: 'rgba(217, 119, 87, 0.15)',
              onPrimaryContainer: '#ffb49d',
              outline: '#4a4a49',
              outlineVariant: '#3a3a39',
              onSurface: '#e8e8e8',
              onSurfaceVariant: '#a1a1a0'
            }
          },
          fontFamily: {
            sans: ['JetBrains Mono', 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
          borderRadius: {
            'm3-xs': '4px', 'm3-sm': '8px', 'm3-md': '12px',
            'm3-lg': '16px', 'm3-xl': '24px', 'm3-full': '9999px',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1f1f1e;
      --surface: #2a2a29;
      --surface-high: #333332;
      --border: #3a3a39;
      --outline: #4a4a49;
      --text: #e8e8e8;
      --muted: #a1a1a0;
      --accent: #d97757;
      --accent-dim: rgba(217, 119, 87, 0.15);
      --accent-on: #ffb49d;
      --accent2: #8b70d9;
      --accent2-dim: rgba(139, 112, 217, 0.08);
      --ok: #6dc198;
      --err: #d96e6e;
    }

    html { scroll-behavior: smooth; background-color: var(--bg); overscroll-behavior: none; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;
      font-size: 16px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      overscroll-behavior: none;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    img, a { -webkit-user-drag: none; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(217, 119, 87, 0.3); border-radius: 2px; }

    /* ─── NAV (M3) ─── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; padding: 0 24px;
      background: rgba(31, 31, 30, 0.95);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand-wrap { position: relative; }

    #brand-dropdown-btn {
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center;
      padding: 8px 12px; border-radius: 9999px;
      border: none; background: transparent;
      font-family: inherit; font-size: 18px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em;
      transition: background 0.2s ease;
    }
    #brand-dropdown-btn:hover { background: var(--accent-dim); }
    #brand-dropdown-btn .b-static { color: var(--text); }
    #brand-dropdown-btn .b-dot { color: var(--accent); margin: 0 5px; }
    #brand-dropdown-btn .b-page { color: rgba(232, 232, 232, 0.6); font-weight: 500; }
    #brand-dropdown-icon {
      width: 16px; height: 16px; margin-left: 6px;
      color: rgba(232, 232, 232, 0.6); transition: transform 0.2s ease;
    }

    #brand-dropdown-menu {
      position: absolute; top: 100%; left: 0; margin-top: 8px;
      width: 192px; background: var(--surface); border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); border: 1px solid var(--border);
      padding: 8px 0; overflow: hidden;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 110;
    }
    #brand-dropdown-menu.is-open { opacity: 1; pointer-events: auto; }

    .nav-dd-item {
      position: relative; overflow: hidden;
      display: block; padding: 12px 16px;
      font-size: 14px; font-weight: 500; text-decoration: none; color: var(--muted);
      transition: color 0.2s ease, background 0.2s ease;
    }
    .nav-dd-item:hover { color: var(--text); background: var(--surface-high); }
    .nav-dd-item.nav-active { color: var(--accent); background: var(--accent-dim); }

    .nav-right { display: flex; align-items: center; gap: 8px; }

    #lang-toggle {
      background: none; border: 1px solid var(--outline);
      color: var(--accent); font-family: inherit; font-size: 13px; font-weight: 500;
      padding: 6px 16px; border-radius: 9999px; cursor: pointer; letter-spacing: 0.1em;
      position: relative; overflow: hidden;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    #lang-toggle:hover { background: var(--accent-dim); border-color: rgba(217, 119, 87, 0.5); }

    #menu-btn {
      display: none; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text); cursor: pointer;
      padding: 10px; border-radius: 9999px; position: relative; overflow: hidden;
    }
    #menu-btn:hover { background: rgba(255, 255, 255, 0.06); }

    @media (max-width: 767px) {
      #menu-btn { display: flex; }
      #lang-toggle { display: none; }
    }

    #mobile-menu {
      position: fixed; top: 64px; left: 0; width: 100%;
      background: var(--surface); border-bottom: 1px solid var(--border);
      z-index: 90; display: flex; flex-direction: column;
      padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: clip-path 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      clip-path: circle(0% at top right);
    }
    #mobile-menu.open { clip-path: circle(150% at top right); }
    .mobile-lang-btn {
      text-align: left; background: none; border: none;
      color: var(--accent); font-family: inherit; font-size: 15px; font-weight: 500;
      padding: 12px 16px; border-radius: 12px; cursor: pointer;
      transition: background 0.2s ease;
    }
    .mobile-lang-btn:hover { background: var(--accent-dim); }

    /* ─── RIPPLE ─── */
    .ripple-surface { position: relative; overflow: hidden; }
    .ripple {
      position: absolute; border-radius: 50%; transform: scale(0);
      animation: ripple-anim 600ms linear; pointer-events: none;
      background-color: rgba(255, 255, 255, 0.12);
    }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    /* ─── LAYOUT ─── */
    main { padding: 112px 24px 80px; max-width: 1100px; margin: 0 auto; position: relative; flex: 1 0 auto; width: 100%; }

    /* Lesson view — fixed fullscreen workbench */
    body.lesson-mode { overflow: hidden; }
    body.lesson-mode footer { display: none; }

    body.lesson-mode #view-lesson {
      position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
      display: grid; grid-template-rows: auto minmax(0, 1fr); z-index: 5;
      background: var(--surface);
    }
    body.lesson-mode #lesson-back-link { justify-self: start; margin: 36px 0 14px 28px; }
    body.lesson-mode #lesson-content {
      min-height: 0; min-width: 0; display: grid;
      grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
    }
    @media (min-width: 1100px) {
      body.lesson-mode #lesson-content {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
      }
    }

    /* ─── HERO ─── */
    .learn-hero { margin-bottom: 64px; }
    .learn-hero-greeting {
      color: var(--accent); font-size: 13px; letter-spacing: 0.25em;
      text-transform: uppercase; margin-bottom: 20px;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .learn-hero-greeting::before {
      content: ''; display: inline-block; width: 32px; height: 2px; background: var(--accent);
    }
    .learn-hero-title {
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 800; line-height: 1.1; letter-spacing: -0.03em;
      color: var(--text); margin-bottom: 18px;
    }
    .learn-hero-sub { color: var(--muted); font-size: 17px; line-height: 1.9; max-width: 600px; }

    /* ─── COURSE LIST ─── */
    .course-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    .course-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 28px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 14px;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      position: relative; overflow: hidden;
    }
    .course-card:hover {
      background: var(--surface-high);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      transform: translateY(-2px);
    }
    .course-card-icon { font-size: 32px; line-height: 1; }
    .course-card-title { color: var(--text); font-size: 20px; font-weight: 700; }
    .course-card-desc { color: var(--muted); font-size: 14px; line-height: 1.7; }
    .course-card-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); margin-top: 4px; flex-wrap: wrap;
    }
    .course-card-pill {
      font-size: 11px; color: var(--accent-on); background: var(--accent-dim);
      padding: 3px 10px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .course-card-coming { filter: grayscale(0.6) opacity(0.55); pointer-events: none; }

    /* ─── RESET BUTTON ─── */
    .reset-btn {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px; border-radius: 9999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; overflow: hidden;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      z-index: 2;
    }
    .reset-btn svg { width: 15px; height: 15px; flex-shrink: 0; transition: transform 0.35s ease; }
    .reset-btn:hover { color: var(--err); border-color: rgba(217,110,110,0.4); background: rgba(217,110,110,0.08); }
    .reset-btn:hover svg { transform: rotate(-180deg); }

    .reset-btn-inline {
      position: relative; width: auto; height: auto;
      border-radius: 9999px; padding: 6px 16px 6px 12px; gap: 6px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
      display: inline-flex; align-items: center;
      top: auto; right: auto;
    }
    .reset-btn-inline svg { width: 13px; height: 13px; }

    /* ─── PLAYGROUND ─── */
    .pg-action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }

    /* ─── BACK LINKS ─── */
    .course-back, .lesson-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none;
      font-size: 13px; font-weight: 500;
      padding: 8px 20px 8px 16px; border-radius: 9999px;
      border: 1px solid var(--outline);
      position: relative; overflow: hidden;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      margin-bottom: 28px;
    }
    .course-back:hover, .lesson-back:hover {
      color: var(--text); background: var(--surface); border-color: var(--border);
    }

    /* ─── COURSE HEADER ─── */
    .course-header { margin-bottom: 36px; }
    .course-header-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800;
      line-height: 1.2; color: var(--text); margin-bottom: 12px;
    }
    .course-header-sub { color: var(--muted); font-size: 15px; line-height: 1.8; max-width: 700px; }

    .course-progress {
      display: flex; align-items: center; gap: 14px;
      margin-top: 20px; font-size: 13px; color: var(--muted); flex-wrap: wrap;
    }
    .progress-bar { flex: 1; max-width: 360px; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .progress-bar-inner {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-on));
      transition: width 0.5s ease;
    }

    /* ─── LESSON LIST ─── */
    .lesson-list { display: grid; gap: 8px; }

    .lesson-section-label {
      color: var(--accent); font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 700;
      margin-top: 28px; margin-bottom: 6px;
      padding-bottom: 8px; border-bottom: 1px solid var(--accent-dim);
    }
    .lesson-section-label:first-child { margin-top: 0; }

    .lesson-row {
      display: grid; grid-template-columns: 36px 1fr auto;
      gap: 16px; align-items: center;
      padding: 14px 18px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      text-decoration: none; color: inherit;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }
    .lesson-row:hover { background: var(--surface-high); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
    .lesson-row-num { font-size: 13px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
    .lesson-row-title { color: var(--text); font-size: 15px; font-weight: 600; }
    .lesson-row-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .lesson-row-status {
      display: inline-flex; align-items: center; color: var(--muted); opacity: 0.6;
      transition: color 0.2s ease, opacity 0.2s ease;
    }
    .lesson-row-status svg { width: 18px; height: 18px; }
    .lesson-row:hover .lesson-row-status { color: var(--accent); opacity: 1; }
    .lesson-row.is-done .lesson-row-num { color: var(--ok); }
    .lesson-row.is-done .lesson-row-status { color: var(--ok); opacity: 1; }
    .lesson-row.is-current { border-color: rgba(217, 119, 87, 0.4); background: var(--accent-dim); }
    .lesson-row.is-current .lesson-row-num { color: var(--accent); }

    /* ─── LESSON PANES ─── */
    .lesson-wrap {
      display: grid; grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: 0; height: 100%; width: 100%;
    }
    @media (min-width: 1100px) {
      .lesson-wrap { grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr); align-items: stretch; }
    }

    body.lesson-mode .lesson-pane {
      background: var(--surface); border: none; border-radius: 0;
      padding: 22px 26px; min-width: 0; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
    }
    body.lesson-mode .lesson-pane-left { border-right: 1px solid var(--border); }
    @media (max-width: 1099px) {
      body.lesson-mode .lesson-pane-left { border-right: none; border-bottom: 1px solid var(--border); }
    }

    .lesson-right { display: block; }
    .lesson-right > * + * { margin-top: 14px; }
    .lesson-right .editor-host { min-height: 200px; }
    .lesson-right .result-box { max-height: 38vh; overflow: auto; }

    .hint-panel {
      background: var(--accent2-dim); border: 1px solid rgba(139, 112, 217, 0.2);
      border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 13.5px; line-height: 1.7;
    }
    .hint-panel .task-label { color: var(--accent2); margin-bottom: 4px; }

    .lesson-pane {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 26px 28px;
    }
    .lesson-pane h2 {
      font-size: 20px; font-weight: 700; color: var(--text);
      margin-top: 28px; margin-bottom: 12px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .lesson-pane h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .lesson-pane h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 20px; margin-bottom: 8px; }
    .lesson-pane p { color: var(--text); font-size: 14.5px; line-height: 1.85; margin-bottom: 10px; }
    .lesson-pane strong { color: var(--accent); font-weight: 700; }
    .lesson-pane em { color: var(--accent-on); }
    .lesson-pane ul, .lesson-pane ol { padding-left: 22px; margin: 6px 0 14px; }
    .lesson-pane li { margin: 4px 0; color: var(--text); font-size: 14.5px; }
    .lesson-pane code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
      color: var(--accent-on); background: var(--accent-dim);
      padding: 2px 6px; border-radius: 6px;
    }
    .lesson-pane pre {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px; overflow-x: auto;
      font-size: 13px; line-height: 1.7; margin: 10px 0;
    }
    .lesson-pane pre code { color: var(--text); background: none; padding: 0; font-size: 13px; }
    .lesson-pane blockquote {
      border-left: 4px solid rgba(217, 119, 87, 0.6); padding: 8px 16px; margin: 12px 0;
      color: var(--muted); font-style: italic; background: var(--accent-dim);
      border-radius: 0 12px 12px 0;
    }

    .lesson-meta-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      font-size: 12px; color: var(--muted); margin-bottom: 14px;
    }
    .lesson-pill {
      color: var(--accent-on); background: var(--accent-dim);
      padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    }
    .lesson-title {
      font-size: clamp(1.6rem, 3.4vw, 2.2rem); font-weight: 800;
      color: var(--text); line-height: 1.2; margin-bottom: 8px;
    }
    .lesson-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 22px; }

    .lesson-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 8px; }
    .lesson-title-row .lesson-title { margin-bottom: 0; flex: 1 1 auto; min-width: 0; }
    .lesson-title-row .tutorial-link { margin-top: 6px; flex: 0 0 auto; white-space: nowrap; }
    @media (max-width: 720px) {
      .lesson-title-row { flex-direction: column; align-items: flex-start; }
      .lesson-title-row .tutorial-link { margin-top: 4px; }
    }

    .tutorial-link {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 18px;
      color: var(--accent); text-decoration: none; font-size: 13px;
      padding: 7px 16px; border-radius: 9999px; border: 1px solid var(--outline);
      position: relative; overflow: hidden;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .tutorial-link svg { transition: transform 0.25s ease; }
    .tutorial-link:hover { background: var(--accent-dim); border-color: rgba(217,119,87,0.4); }
    .tutorial-link:hover svg { transform: translate(2px, -2px); }

    /* ─── TABLES ─── */
    .lesson-pane table, .data-table {
      width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0;
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .lesson-pane th, .data-table th {
      background: var(--accent-dim); color: var(--accent-on); font-weight: 700;
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border); font-size: 12px;
    }
    .lesson-pane td, .data-table td {
      padding: 6px 12px; color: var(--text);
      border-bottom: 1px solid var(--border); vertical-align: top;
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    }
    .lesson-pane tr:last-child td, .data-table tr:last-child td { border-bottom: none; }
    .data-table-name {
      color: var(--accent); font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em; margin: 14px 0 4px; text-transform: lowercase;
    }
    .data-table-name::before { content: '▸ '; opacity: 0.7; }

    /* ─── TASK / EDITOR ─── */
    .task-block {
      background: var(--accent-dim); border: 1px solid rgba(217, 119, 87, 0.25);
      border-radius: 12px; padding: 16px 18px; margin-bottom: 18px;
    }
    .task-label {
      color: var(--accent); font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px;
    }
    .task-text { color: var(--text); font-size: 14.5px; line-height: 1.8; }
    .task-text code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
      color: var(--accent-on); background: var(--accent-dim);
      padding: 1px 6px; border-radius: 6px;
    }

    .editor-wrap { position: relative; margin-bottom: 14px; }
    .editor-label {
      display: flex; justify-content: space-between; align-items: center;
      color: var(--muted); font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 700; margin-bottom: 8px;
    }
    .editor-actions { display: flex; gap: 6px; }
    .editor-mini-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: inherit; font-size: 11px;
      letter-spacing: 0.05em; padding: 4px 10px; border-radius: 8px; cursor: pointer;
      position: relative; overflow: hidden;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .editor-mini-btn:hover { color: var(--accent); border-color: rgba(217,119,87,0.3); background: var(--surface-high); }

    .editor-host {
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .editor-host.is-focused { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,87,0.1); }
    .editor-host .ace_editor {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13.5px; line-height: 1.7; border-radius: 12px;
    }

    .editor-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      font-family: inherit; cursor: pointer; font-size: 13px; font-weight: 600;
      padding: 9px 20px; border-radius: 9999px; border: 1px solid transparent;
      transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px;
      position: relative; overflow: hidden;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 4px 12px rgba(217,119,87,0.3); }
    .btn-ghost { background: var(--surface); color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); background: var(--surface-high); }
    .btn-ok { background: var(--ok); color: #07150e; border-color: var(--ok); }
    .btn-ok:hover { filter: brightness(1.08); }

    .result-box {
      margin-top: 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; min-height: 80px;
    }
    .result-status {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .result-status.is-pass { color: var(--ok); }
    .result-status.is-fail { color: var(--err); }
    .result-status.is-info { color: var(--muted); }
    .result-status .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
    .result-message { color: var(--text); font-size: 13px; margin-bottom: 6px; }
    .result-tables-row { display: grid; gap: 14px; grid-template-columns: 1fr; }
    @media (min-width: 700px) { .result-tables-row.has-expected { grid-template-columns: 1fr 1fr; } }
    .result-table-wrap { min-width: 0; overflow-x: auto; }
    .result-table-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
    .result-empty { color: var(--muted); font-style: italic; padding: 8px 0; font-size: 13px; }
    .result-error {
      background: rgba(217, 110, 110, 0.08); border: 1px solid rgba(217, 110, 110, 0.25);
      color: #f0a8a8; border-radius: 12px; padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
      white-space: pre-wrap; word-break: break-word;
    }

    .lesson-nav-foot {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
      margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--border);
    }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none; font-size: 13px;
      padding: 8px 16px; border-radius: 9999px;
      border: 1px solid var(--outline); background: transparent;
      position: relative; overflow: hidden;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .nav-btn:hover { color: var(--text); background: var(--surface); }
    .nav-btn[aria-disabled="true"] { opacity: 0.35; pointer-events: none; }

    /* ─── FADE IN ─── */
    .fade-in {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .fade-in.visible { opacity: 1; transform: none; }

    /* ─── FOOTER ─── */
    footer {
      text-align: center; padding: 40px 24px;
      color: var(--muted); font-size: 13px;
      border-top: 1px solid var(--border);
      background: rgba(42, 42, 41, 0.3); letter-spacing: 0.05em;
    }

    .not-found { text-align: center; padding: 80px 24px; color: var(--muted); }
    .not-found h2 { color: var(--text); font-size: 24px; margin-bottom: 12px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      main { padding: 96px 18px 60px; }
      .lesson-pane { padding: 20px 18px; }
      .editor-bar .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>

  <script>

        'btn-show-answer': 'Show answer',
        'btn-hide-answer': 'Hide answer',
        'btn-prev': 'Previous',
        'btn-next': 'Next',
        'btn-back-list': 'Back to lessons',
        'result-pass': 'Passed',
        'result-fail': 'Not yet',
        'result-runonly': 'Executed',
        'result-empty': '(no rows)',
        'result-yours': 'Your result',
        'result-expected': 'Expected',
        'result-error': 'Error',
        'result-no-rows': 'Your query returned no rows.',
        'msg-pass': 'Nice ✦ Correct answer — you can move to the next lesson!',
        'msg-fail-rows': 'Wrong row count: you returned {got} rows, expected {want}.',
        'msg-fail-cols': 'Column mismatch. Check what your SELECT projects and the order.',
        'msg-fail-data': 'Cell values differ. Compare your result with the expected one.',
        'msg-fail-order': 'Order is off — the task wants a specific order, add ORDER BY.',
        'msg-no-engine': 'SQL engine has not loaded — refresh the page.',
        'msg-empty-query': 'Type some SQL first, then click Run.',
        'progress-label': 'Progress',
        'lessons-count': 'lessons',
        'difficulty': 'Difficulty',
        'tables-label': 'Tables in this lesson',
        'hint-label': 'Hint',
        'show-hint': 'Show hint',
        'hide-hint': 'Hide hint',
        'coming-soon': 'Coming soon',
        'not-found-title': 'Not found',
        'not-found-desc': 'The link may have changed. Try going back.',
        'not-found-back': 'Back to courses',
        'final-section': 'Final Challenge',
        'lesson-section': 'Syntax lessons',
        'tutorial-link': 'Read this chapter on the blog',
        'nav-hint': 'Click here to switch between my different pages',
        'reset-progress': 'Clear progress',
        'reset-confirm': 'Clear all progress for "{course}"?\n\nThis cannot be undone — every passed lesson will be marked unfinished again.',
        'reset-no-progress': 'There is no progress to clear yet.',
        'playground-label': 'Custom SQL Playground',
        'playground-load-demo': 'Load Demo Tables',
        'playground-reset': 'Reset Tables',
        'playground-tables-label': 'Current Database',
        'playground-empty': 'No tables yet — load demos or CREATE TABLE yourself.',
      }
    };

    let currentLang = 'en';
    const userBrowserLang = navigator.language.toLowerCase();
    if (userBrowserLang === 'zh-cn' || userBrowserLang === 'zh') currentLang = 'zh';
    try {
      const saved = localStorage.getItem('louie-lang');
      if (saved === 'zh' || saved === 'en') currentLang = saved;
    } catch(e) {}

    function applyLang(lang) {
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'zh' ? 'EN' : '中';
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      try { localStorage.setItem('louie-lang', lang); } catch(e) {}
      route();
    }
    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLang(currentLang);
    }

    function tt(key, vars) {
      let s = (translations[currentLang] || translations.en)[key] || key;
      if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
      return s;
    }

    function pickLang(field, fallback = '') {
      if (field == null) return fallback;
      if (typeof field === 'string') return field;
      return field[currentLang] || field.en || field.zh || fallback;
    }

    /* ─── Ripple ─── */
    const RIPPLE_SEL = '.ripple-surface, .btn, .editor-mini-btn, .nav-btn, .reset-btn, .tutorial-link, .course-back, .lesson-back';
    function bindRipples() {
      document.querySelectorAll(RIPPLE_SEL).forEach(el => {
        if (el.classList.contains('ripple-bound')) return;
        el.classList.add('ripple-bound');
        el.addEventListener('mousedown', (event) => {
          const circle = document.createElement('span');
          const diameter = Math.max(el.clientWidth, el.clientHeight);
          const radius = diameter / 2;
          const rect = el.getBoundingClientRect();
          circle.style.width = circle.style.height = `${diameter}px`;
          circle.style.left = `${event.clientX - rect.left - radius}px`;
          circle.style.top = `${event.clientY - rect.top - radius}px`;
          circle.classList.add('ripple');
          const existing = el.querySelector('.ripple');
          if (existing) existing.remove();
          el.appendChild(circle);
        });
      });
    }
    bindRipples();

    /* ─── Nav (M3) ─── */
    const brandBtn = document.getElementById('brand-dropdown-btn');
    const brandMenu = document.getElementById('brand-dropdown-menu');
    const brandIcon = document.getElementById('brand-dropdown-icon');

    brandBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = brandMenu.classList.contains('is-open');
      if (isOpen) {
        brandMenu.classList.remove('is-open');
        brandIcon.style.transform = 'rotate(0deg)';
      } else {
        brandMenu.classList.add('is-open');
        brandIcon.style.transform = 'rotate(180deg)';
      }
    });

    document.addEventListener('click', (e) => {
      if (!brandBtn.contains(e.target) && !brandMenu.contains(e.target)) {
        brandMenu.classList.remove('is-open');
        brandIcon.style.transform = 'rotate(0deg)';
      }
    });

    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('open'));
    mobileMenu.addEventListener('click', () => mobileMenu.classList.remove('open'));

    /* ─── Fade in ─── */
    let fadeObserver = null;
    function bindFadeIn() {
      if (fadeObserver) fadeObserver.disconnect();
      fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.05 });
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => fadeObserver.observe(el));
    }

    /* ─── Manifest + course loading ─── */
    let manifest = { courses: [] };
    function loadManifest() {
      const m = window.__LEARN_MANIFEST;
      if (!m) {
        console.error('learn_data/manifest.js did not register window.__LEARN_MANIFEST');
        manifest = { courses: [] };
        return;
      }
      manifest = { ...m, courses: (m.courses || []) };
    }

    const _courseLoading = {};
    function loadCourse(slug) {
      const cached = (window.__LEARN_COURSES || {})[slug];
      if (cached) return Promise.resolve(cached);
      if (_courseLoading[slug]) return _courseLoading[slug];
      _courseLoading[slug] = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = `learn_data/${slug}/course.js`;
        script.async = false;
        script.onload = () => {
          delete _courseLoading[slug];
          const c = (window.__LEARN_COURSES || {})[slug];
          if (c) resolve(c);
          else reject(new Error(`${script.src} did not register window.__LEARN_COURSES['${slug}']`));
        };
        script.onerror = () => {
          delete _courseLoading[slug];
          reject(new Error(`Failed to load ${script.src}`));
        };
        document.head.appendChild(script);
      });
      return _courseLoading[slug];
    }

    /* ─── Progress (per course) ─── */
    function progKey(slug) { return `louie-learn:${slug}:done`; }
    function loadProgress(slug) {
      try {
        const v = localStorage.getItem(progKey(slug));
        return v ? JSON.parse(v) : {};
      } catch(e) { return {}; }
    }
    function saveProgress(slug, prog) {
      try { localStorage.setItem(progKey(slug), JSON.stringify(prog)); } catch(e) {}
    }
    function markDone(slug, lessonId) {
      const prog = loadProgress(slug);
      prog[lessonId] = true;
      saveProgress(slug, prog);
    }
    function resetProgress(slug) {
      try { localStorage.removeItem(progKey(slug)); } catch(e) {}
    }
    function promptResetCourse(slug, courseTitle) {
      const prog = loadProgress(slug);
      if (Object.keys(prog).length === 0) {
        alert(tt('reset-no-progress'));
        return;
      }
      const msg = tt('reset-confirm').replace('{course}', courseTitle);
      if (!confirm(msg)) return;
      resetProgress(slug);
      route();
    }

    /* ─── Course list view ─── */
    function renderCourseList() {
      const wrap = document.getElementById('course-list');
      const courses = manifest.courses || [];
      if (courses.length === 0) {
        wrap.innerHTML = `<div class="not-found"><p>${tt('coming-soon')}</p></div>`;
        return;
      }
      wrap.innerHTML = courses.map(c => {
        const isComing = c.coming === true;
        const lessonsLabel = c.lessonsCount ? `${c.lessonsCount} ${tt('lessons-count')}` : '';
        const href = isComing ? '#' : `#${c.slug}`;
        const resetBtn = isComing ? '' : `
          <button class="reset-btn ripple-surface js-reset-btn" data-slug="${c.slug}" type="button" title="${tt('reset-progress')}" aria-label="${tt('reset-progress')}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          </button>`;
        return `
          <a class="course-card ripple-surface fade-in${isComing ? ' course-card-coming' : ''}" href="${href}" style="position: relative;">
            ${resetBtn}
            <div class="course-card-icon">${c.icon || ''}</div>
            <div class="course-card-title">${pickLang(c.title)}</div>
            <div class="course-card-desc">${pickLang(c.desc)}</div>
            <div class="course-card-meta">
              ${lessonsLabel ? `<span class="course-card-pill">${lessonsLabel}</span>` : ''}
              ${c.level ? `<span class="course-card-pill">${pickLang(c.level)}</span>` : ''}
              ${isComing ? `<span class="course-card-pill">${tt('coming-soon')}</span>` : ''}
            </div>
          </a>
        `;
      }).join('');
      wrap.querySelectorAll('.js-reset-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          const slug = btn.dataset.slug;
          const course = courses.find(x => x.slug === slug);
          promptResetCourse(slug, pickLang(course ? course.title : slug));
        });
      });
      bindFadeIn();
      bindRipples();
    }

    /* ─── Course (lesson list) view ─── */
    async function renderCourse(slug) {
      const wrap = document.getElementById('course-content');
      let course;
      try {
        course = await loadCourse(slug);
      } catch (e) {
        wrap.innerHTML = `<div class="not-found"><h2>${tt('not-found-title')}</h2><p>${tt('not-found-desc')}</p><p style="margin-top:18px;"><a class="course-back" href="#">→ ${tt('not-found-back')}</a></p></div>`;
        return;
      }
      const lessons = course.lessons || [];
      const prog = loadProgress(slug);
      const doneCount = lessons.filter(l => prog[l.id]).length;
      const pct = lessons.length ? Math.round((doneCount / lessons.length) * 100) : 0;

      const sections = {};
      const sectionOrder = [];
      for (const l of lessons) {
        const sec = l.section || 'main';
        if (!(sec in sections)) { sections[sec] = []; sectionOrder.push(sec); }
        sections[sec].push(l);
      }
      const sectionLabel = (sec) => {
        if (sec === 'final') return tt('final-section');
        if (sec === 'main') return tt('lesson-section');
        return sec;
      };

      const sectionsHtml = sectionOrder.map(sec => {
        const rows = sections[sec].map(l => {
          const isDone = !!prog[l.id];
          return `
            <a class="lesson-row ripple-surface${isDone ? ' is-done' : ''}" href="#${slug}/${l.id}">

    /* ─── SQL engine (sql.js / SQLite) ─── */
    let SQL = null;
    let _sqlReady = null;
    function ensureSql() {
      if (SQL) return Promise.resolve(SQL);
      if (_sqlReady) return _sqlReady;
      _sqlReady = (typeof initSqlJs === 'function' ? initSqlJs() : Promise.reject(new Error('sql.js not loaded')))
        .then(s => { SQL = s; return s; });
      return _sqlReady;
    }
    ensureSql().catch(e => console.error('sql.js init failed:', e));

    function freshDb() {
      if (!SQL) throw new Error('SQL engine not ready');
      return new SQL.Database();
    }

    function execToRows(db, sql) {
      const out = db.exec(sql);
      if (!out || out.length === 0) return [];
      const last = out[out.length - 1];
      const cols = last.columns;
      return last.values.map(v => {
        const row = {};
        for (let i = 0; i < cols.length; i++) row[cols[i]] = v[i];
        return row;
      });
    }
    function runSetup(db, sqlText) {
      if (!sqlText || !sqlText.trim()) return;
      db.exec(sqlText);
    }
    function runSingleSelect(db, sql) {
      return execToRows(db, sql);
    }

    function compareRows(actual, expected, checkOrder) {
      if (!Array.isArray(actual)) actual = [];
      if (!Array.isArray(expected)) expected = [];
      if (actual.length !== expected.length) {
        return { ok: false, code: 'rows', got: actual.length, want: expected.length };
      }
      function normalizeCell(v) {
        if (v == null) return 'NULL';
        if (typeof v === 'number') {
          if (Number.isInteger(v)) return String(v);
          return v.toFixed(6).replace(/\.?0+$/, '');
        }
        return String(v);
      }
      const expectedCols = expected.length > 0 ? Object.keys(expected[0]) : [];
      const actualCols   = actual.length   > 0 ? Object.keys(actual[0])   : [];
      if (expected.length === 0 && actual.length === 0) return { ok: true };
      if (expectedCols.length !== actualCols.length) return { ok: false, code: 'cols' };

      function rowToTuple(row, cols) { return cols.map(c => normalizeCell(row[c])); }
      const actualTuples   = actual.map(r => rowToTuple(r, actualCols));
      const expectedTuples = expected.map(r => rowToTuple(r, expectedCols));

      if (checkOrder) {
        for (let i = 0; i < expectedTuples.length; i++) {
          for (let j = 0; j < expectedCols.length; j++) {
            if (actualTuples[i][j] !== expectedTuples[i][j]) return { ok: false, code: 'data' };
          }
        }
        return { ok: true };
      } else {
        const sortKey = (t) => t.join('');
        const a = actualTuples.map(sortKey).sort();
        const e = expectedTuples.map(sortKey).sort();
        for (let i = 0; i < a.length; i++) {
          if (a[i] !== e[i]) return { ok: false, code: 'data' };
        }
        return { ok: true };
      }
    }

    function renderSchemaPreview(db, tables) {
      if (!tables || tables.length === 0) return '';
      let html = '';
      for (const tname of tables) {
        try {
          const rows = execToRows(db, `SELECT * FROM ${tname}`);
          html += `<div class="data-table-name">${tname}</div>`;
          html += renderResultTable(rows, true);
        } catch (e) {
          html += `<div class="data-table-name">${tname}</div><div class="result-empty">(could not preview: ${e.message})</div>`;
        }
      }
      return html;
    }

    function renderResultTable(rows, compact) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return `<div class="result-empty">${tt('result-empty')}</div>`;
      }
      const cols = Object.keys(rows[0]);
      const head = cols.map(c => `<th>${escapeHtml(c)}</th>`).join('');
      const body = rows.map(r =>
        '<tr>' + cols.map(c => `<td>${formatCell(r[c])}</td>`).join('') + '</tr>'
      ).join('');
      return `<table class="data-table">
        <thead><tr>${head}</tr></thead>
        <tbody>${body}</tbody>
      </table>`;
    }
    function formatCell(v) {
      if (v == null) return '<span style="color:var(--muted); font-style:italic;">NULL</span>';
      if (typeof v === 'number' && !Number.isInteger(v)) {
        return escapeHtml(Number(v.toFixed(6)).toString());
      }
      return escapeHtml(String(v));
    }
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

      const editorHost = document.getElementById('editor-host');
      const aceEd = ace.edit(document.getElementById('sql-editor'));
      aceEd.setTheme('ace/theme/tomorrow_night');
      aceEd.session.setMode('ace/mode/mysql');

      const editor = {
        get value() { return aceEd.getValue(); },
        set value(v) { aceEd.setValue(v, -1); },

      const resultBox = document.getElementById('result-box');

      function setStatus(status, msg) {
        const cls = status === 'pass' ? 'is-pass' : status === 'fail' ? 'is-fail' : 'is-info';

      function runUserSql() {
        const sql = (editor.value || '').trim();
        if (!sql) { setStatus('info', `<div class="result-message">${tt('msg-empty-query')}</div>`); return null; }
        const fdb = freshDb();
        try { runSetup(fdb, lesson.setup); } catch (e) { showError(e); return null; }
        try {

          return { rows, db: fdb };

      document.getElementById('btn-run').addEventListener('click', () => {
        const r = runUserSql();
        if (!r) return;
        const tableHtml = renderResultTable(r.rows);

          <div class="result-message">${currentLang === 'zh' ? '查询执行成功。' : 'Query executed.'}</div>
          <div class="result-table-wrap">
            <div class="result-table-label">${tt('result-yours')}</div>
            ${tableHtml}
          </div>
        `);
      });

      document.getElementById('btn-check').addEventListener('click', () => {
        const r = runUserSql();
        if (!r) return;
        const edb = freshDb();
        try { runSetup(edb, lesson.setup); } catch (e) { showError(e); return; }
        let expectedRows;
        try { expectedRows = runSingleSelect(edb, lesson.expectedSql); }
        catch (e) { showError(e); return; }

        const cmp = compareRows(r.rows, expectedRows, !!lesson.checkOrder);
        const yourTbl = `
          <div class="result-table-wrap">
            <div class="result-table-label">${tt('result-yours')}</div>
            ${renderResultTable(r.rows)}
          </div>`;
        const expectedTbl = `
          <div class="result-table-wrap">
            <div class="result-table-label">${tt('result-expected')}</div>
            ${renderResultTable(expectedRows)}
          </div>`;
        const tablesRow = `<div class="result-tables-row has-expected">${yourTbl}${expectedTbl}</div>`;

        if (cmp.ok) {
          markDone(courseSlug, lesson.id);
          setStatus('pass', `<div class="result-message">${tt('msg-pass')}</div>${tablesRow}`);
        } else {
          let msg;
          if (cmp.code === 'rows') msg = tt('msg-fail-rows', { got: cmp.got, want: cmp.want });
          else if (cmp.code === 'cols') msg = tt('msg-fail-cols');
          else if (cmp.code === 'order') msg = tt('msg-fail-order');
          else msg = tt('msg-fail-data');
          setStatus('fail', `<div class="result-message">${msg}</div>${tablesRow}`);
        }
      });

      document.getElementById('btn-reset').addEventListener('click', () => {
        editor.value = initial;
        setStatus('info', `<div class="result-message" style="color: var(--muted);">${currentLang === 'zh' ? '已恢复到起始代码。' : 'Reset to starter code.'}</div>`);
      });

      const showBtn = document.getElementById('btn-show-answer');
      let answerShown = false;
      let answerSaved = '';
      showBtn.addEventListener('click', () => {
        if (!answerShown) {
          answerSaved = editor.value;
          editor.value = lesson.expectedSql || '';
          showBtn.textContent = tt('btn-hide-answer');
          answerShown = true;
        } else {
          editor.value = answerSaved;
          showBtn.textContent = tt('btn-show-answer');
          answerShown = false;
        }
      });

      const hintToggle = document.getElementById('hint-toggle');
      if (hintToggle) {
        hintToggle.addEventListener('click', () => {
          const body = document.getElementById('hint-body');
          const open = body.style.display !== 'none';
          body.style.display = open ? 'none' : 'block';
          hintToggle.textContent = open ? tt('show-hint') : tt('hide-hint');
        });
      }
    }

    /* ─── Router ─── */
    function route() {
      const hash = location.hash.replace(/^#/, '').trim();
      const parts = hash.split('/').filter(Boolean);
      const courseList = document.getElementById('view-courses');
      const courseView = document.getElementById('view-course');
      const lessonView = document.getElementById('view-lesson');
      const main = document.getElementById('main');

      document.getElementById('course-back-link').href = '#';
      if (parts.length >= 1) {
        document.getElementById('lesson-back-link').href = '#' + parts[0];
      }

      const inLesson = parts.length >= 2;
      main.classList.toggle('is-lesson', inLesson);
      document.body.classList.toggle('lesson-mode', inLesson);

      if (parts.length === 0) {
        courseList.style.display = 'block';
        courseView.style.display = 'none';
        lessonView.style.display = 'none';
        renderCourseList();
        window.scrollTo({ top: 0, behavior: 'instant' });
      } else if (parts.length === 1) {
        courseList.style.display = 'none';
        courseView.style.display = 'block';
        lessonView.style.display = 'none';
        renderCourse(parts[0]);
        window.scrollTo({ top: 0, behavior: 'instant' });
      } else if (parts[1] === 'playground') {
        courseList.style.display = 'none';
        courseView.style.display = 'none';
        lessonView.style.display = '';
        renderPlayground(parts[0]);
        window.scrollTo({ top: 0, behavior: 'instant' });
      } else {
        courseList.style.display = 'none';
        courseView.style.display = 'none';
        lessonView.style.display = '';
        renderLesson(parts[0], parts[1]);
        window.scrollTo({ top: 0, behavior: 'instant' });
      }
    }

    window.addEventListener('hashchange', route);

    /* ─── Boot ─── */
    loadManifest();
    applyLang(currentLang);
    bindFadeIn();
  </script>
</body>
</html>
