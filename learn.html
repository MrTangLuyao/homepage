<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Louie's Learn — interactive language tutorials with code-the-answer challenges">
  <title>Louie — Learn</title>
  <link rel="icon" href="lib/resources/po.webp">
  <link rel="stylesheet" href="lib/design/fonts.css">
  <link rel="stylesheet" href="lib/design/louie.css">
  <link rel="stylesheet" href="learn/learn.css">
  <script src="lib/design/tailwindcss.js"></script>
  <script src="lib/design/tailwind.config.js"></script>
</head>

<body>

  <nav id="navbar">
    <div class="nav-brand-wrap" id="brand-dropdown-container">
      <button id="brand-dropdown-btn" class="ripple-surface" type="button">
        <span class="b-static">louie</span><span class="b-dot">.</span><span class="b-page">learn</span>
        <svg id="brand-dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div id="brand-dropdown-menu">
        <a href="index.html" class="nav-dd-item ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--muted)">home</span></a>
        <a href="blog.html" class="nav-dd-item ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--muted)">blog</span></a>
        <a href="learn.html" class="nav-dd-item nav-active ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--accent);font-weight:600">learn</span></a>
        <a href="95.html" class="nav-dd-item ripple-surface"><span style="color:var(--text)">louie</span><span class="b-dot">.</span><span style="color:var(--muted)">95</span></a>
      </div>
    </div>
    <div class="nav-right">
      <button id="lang-toggle" class="ripple-surface" onclick="toggleLang()" style="display:inline-flex; align-items:center; gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
        <span id="lang-label">EN ⇄ 文</span>
      </button>
    </div>
  </nav>


  <main id="main">
    <!-- COURSE LIST VIEW -->
    <div id="view-courses">
      <div class="learn-hero fade-in">
        <p class="learn-hero-greeting" data-i18n="learn-greeting">interactive · code to win</p>
        <h1 class="learn-hero-title" data-i18n="learn-title">Learn</h1>
        <p class="learn-hero-sub" data-i18n="learn-sub">闯关式学语法。每节课都用真实代码解决一个小任务，过关再下一关。</p>
      </div>

      <div class="course-list" id="course-list"></div>
    </div>

    <!-- COURSE (lesson list) VIEW -->
    <div id="view-course" style="display:none;">
      <a href="#" class="course-back ripple-surface" id="course-back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span data-i18n="course-back">All courses</span>
      </a>
      <div id="course-content"></div>
    </div>

    <!-- LESSON VIEW -->
    <div id="view-lesson" style="display:none;">
      <div id="lesson-top-bar">
        <a href="#" class="lesson-back ripple-surface" id="lesson-back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          <span data-i18n="lesson-back">Lessons</span>
        </a>
        <div id="lesson-nav-bar"></div>
      </div>
      <div id="lesson-content"></div>
    </div>
  </main>

  <footer>
    <span data-i18n="footer-copy">Copyright © 2026 路易的学习室</span>
  </footer>

  <script src="lib/runtime/sql-asm.js"></script>
  <script src="lib/runtime/monaco/vs/loader.js"></script>
  <script src="learn/learn_data/manifest.js"></script>
  <script src="learn/learn-i18n.js"></script>
  <script src="learn/learn-core.js"></script>
  <script src="learn/learn-engines.js"></script>
  <script src="learn/learn-views.js"></script>
  <script src="learn/learn-lesson.js"></script>
</body>
</html>
