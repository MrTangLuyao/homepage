<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>louie.learn — C runtime (emception)</title>
  <style>
    /* Hide upstream demo UI completely — we only use it as a runtime. */
    html, body { margin: 0; padding: 0; background: #1f1f1e; color: #cfcfcf;
                 font: 13px/1.4 ui-monospace, 'JetBrains Mono', monospace; }
    #layout, #header, #editor, #vgutter, #preview, #hgutter, #output { display: none !important; }
    #status { display: none; }
    #fallback { padding: 24px; text-align: center; min-height: 100vh;
                display: flex; flex-direction: column; gap: 12px;
                align-items: center; justify-content: center; }
    #fallback.hidden { display: none; }
    .title  { font-size: 14px; color: #f4cf73; }
    .detail { color: #888; font-size: 12px; max-width: 420px; }
  </style>
</head>
<body>
  <div id="fallback">
    <div class="title" id="fb-title">Bootstrapping C runtime…</div>
    <div class="detail" id="fb-detail">If you see this for more than 60 seconds, the parent page should show an error.</div>
  </div>

  <!-- The bundle is fetched + injected by postmsg-bridge.js so we can stream
       download progress to the parent. Don't add a <script src=...bundle> here. -->
  <script src="postmsg-bridge.js" defer></script>
</body>
</html>
