<!doctype html>
<html><head>
<meta charset="utf-8">
<title>xterm smoke test</title>
<link rel="stylesheet" href="lib/runtime/xterm/xterm.min.css">
<style>
  body { background: #1f1f1e; color: #cfcfcf; font-family: monospace; padding: 20px; }
  pre { background: #000; padding: 8px; max-height: 200px; overflow:auto; }
  #host { width: 600px; height: 240px; background: #121211; border: 1px solid #555; }
  #host-hidden { display: none; }
  button { background: #444; color: #fff; padding: 6px 12px; margin: 4px; border:0; cursor:pointer; }
</style>
</head>
<body>
<h2>xterm smoke test</h2>
<div id="log"><pre>booting…</pre></div>
<p>Visible host:</p>
<div id="host"></div>
<p>Hidden host (display:none initially):</p>
<div id="host-hidden"></div>
<p>
  <button id="b-show">Toggle hidden show</button>
  <button id="b-await">Test awaitLine()</button>
  <button id="b-reset">Reset</button>
</p>

<script src="lib/runtime/xterm/xterm.min.js"></script>
<script src="lib/runtime/xterm/xterm-addon-fit.min.js"></script>
<script src="learn/learn-terminal.js"></script>
<script>
const log = (s) => {
  const p = document.querySelector('#log pre');
  p.textContent = p.textContent + '\n' + s;
  p.scrollTop = p.scrollHeight;
};
try {
  log('typeof Terminal: ' + typeof Terminal);
  log('typeof FitAddon: ' + typeof FitAddon);
  log('typeof createLessonTerminal: ' + typeof createLessonTerminal);
} catch (e) { log('precheck error: ' + e.message); }

let term1, term2;
try {
  log('-- creating visible host terminal --');
  term1 = createLessonTerminal(document.getElementById('host'));
  log('visible OK');
  term1.write('hello visible\r\n');
  term1.writeErr('this is an error line\r\n');
  term1.writeMuted('muted line\r\n');
} catch (e) { log('visible CREATE THREW: ' + e.message + '\n' + e.stack); }

try {
  log('-- creating HIDDEN host terminal (display:none) --');
  term2 = createLessonTerminal(document.getElementById('host-hidden'));
  log('hidden OK');
  term2.write('hello hidden\r\n');
} catch (e) { log('hidden CREATE THREW: ' + e.message + '\n' + e.stack); }

document.getElementById('b-show').addEventListener('click', () => {
  const h = document.getElementById('host-hidden');
  if (h.style.display === 'block') {
    h.style.display = 'none'; log('hide host-hidden');
  } else {
    h.style.display = 'block';
    h.style.width = '600px';
    h.style.height = '200px';
    h.style.background = '#121211';
    log('show host-hidden');
    try { term2.fit(); } catch (e) { log('fit err: ' + e.message); }
  }
});
document.getElementById('b-await').addEventListener('click', async () => {
  if (!term1) return;
  log('awaiting line from visible terminal — type something + Enter');
  term1.write('▶ ');
  const s = await term1.awaitLine();
  log('got line: ' + JSON.stringify(s));
});
document.getElementById('b-reset').addEventListener('click', () => {
  if (term1) term1.reset();
  log('reset visible');
});
</script>
</body></html>
